<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 50">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Icon: Globe with AI nodes -->
  <g transform="translate(5, 5)">
    <!-- Outer circle (Globe) -->
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#logoGradient)" stroke-width="2"/>
    <!-- Latitude lines -->
    <ellipse cx="20" cy="20" rx="18" ry="8" fill="none" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="20" cy="20" rx="18" ry="14" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.4"/>
    <!-- Longitude line -->
    <ellipse cx="20" cy="20" rx="8" ry="18" fill="none" stroke="url(#logoGradient)" stroke-width="1.5" opacity="0.6"/>
    <!-- AI Nodes -->
    <circle cx="20" cy="8" r="3" fill="url(#logoGradient)"/>
    <circle cx="32" cy="20" r="3" fill="url(#logoGradient)"/>
    <circle cx="20" cy="32" r="3" fill="url(#logoGradient)"/>
    <circle cx="8" cy="20" r="3" fill="url(#logoGradient)"/>
    <!-- Center node -->
    <circle cx="20" cy="20" r="4" fill="url(#logoGradient)"/>
    <!-- Connecting lines -->
    <line x1="20" y1="12" x2="20" y2="16" stroke="url(#logoGradient)" stroke-width="1.5"/>
    <line x1="20" y1="24" x2="20" y2="28" stroke="url(#logoGradient)" stroke-width="1.5"/>
    <line x1="12" y1="20" x2="16" y2="20" stroke="url(#logoGradient)" stroke-width="1.5"/>
    <line x1="24" y1="20" x2="28" y2="20" stroke="url(#logoGradient)" stroke-width="1.5"/>
  </g>
  <!-- Text: GeoCore -->
  <text x="52" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">
    <tspan fill="url(#logoGradient)">Geo</tspan><tspan fill="#374151">Core</tspan>
  </text>
  <!-- Text: AI badge -->
  <rect x="158" y="16" width="28" height="18" rx="4" fill="url(#logoGradient)"/>
  <text x="172" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">AI</text>
</svg>
