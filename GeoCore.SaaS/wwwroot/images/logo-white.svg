<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 50">
  <!-- Icon: Globe with AI nodes (white version) -->
  <g transform="translate(5, 5)">
    <!-- Outer circle (Globe) -->
    <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2"/>
    <!-- Latitude lines -->
    <ellipse cx="20" cy="20" rx="18" ry="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="20" cy="20" rx="18" ry="14" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
    <!-- Longitude line -->
    <ellipse cx="20" cy="20" rx="8" ry="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <!-- AI Nodes -->
    <circle cx="20" cy="8" r="3" fill="white"/>
    <circle cx="32" cy="20" r="3" fill="white"/>
    <circle cx="20" cy="32" r="3" fill="white"/>
    <circle cx="8" cy="20" r="3" fill="white"/>
    <!-- Center node -->
    <circle cx="20" cy="20" r="4" fill="white"/>
    <!-- Connecting lines -->
    <line x1="20" y1="12" x2="20" y2="16" stroke="white" stroke-width="1.5"/>
    <line x1="20" y1="24" x2="20" y2="28" stroke="white" stroke-width="1.5"/>
    <line x1="12" y1="20" x2="16" y2="20" stroke="white" stroke-width="1.5"/>
    <line x1="24" y1="20" x2="28" y2="20" stroke="white" stroke-width="1.5"/>
  </g>
  <!-- Text: GeoCore AI -->
  <text x="52" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white">
    <tspan>GeoCore</tspan>
  </text>
  <!-- AI badge -->
  <rect x="158" y="16" width="28" height="18" rx="4" fill="white" opacity="0.2"/>
  <text x="172" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">AI</text>
</svg>
