<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - GCore AI 可见度平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
        .glow { box-shadow: 0 0 60px rgba(99, 102, 241, 0.3); }
    </style>
    <script src="js/firebase-config.js"></script>
</head>
<body class="bg-gray-900 min-h-screen flex">
    <!-- 左侧介绍 -->
    <div class="hidden lg:flex lg:w-1/2 gradient-bg p-12 flex-col justify-between relative overflow-hidden">
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-20 left-10 w-64 h-64 bg-white rounded-full filter blur-[80px]"></div>
            <div class="absolute bottom-20 right-10 w-80 h-80 bg-purple-300 rounded-full filter blur-[100px]"></div>
        </div>
        <div class="relative z-10">
            <div class="flex items-center space-x-3">
                <img src="images/logo-white.svg" alt="GeoCore AI" class="h-10">
            </div>
        </div>
        <div class="relative z-10">
            <h1 class="text-4xl font-bold text-white mb-6">
                让您的品牌成为<br>AI 的"标准答案"
            </h1>
            <p class="text-white/80 text-lg mb-8">
                GCore 是下一代 GEO (Generative Engine Optimization) 平台，帮助品牌在 ChatGPT、Claude、Gemini 等 AI 平台获得更高可见度。
            </p>
            <div class="space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <i class="fas fa-chart-line text-white"></i>
                    </div>
                    <span class="text-white/90">SHEEP 五维评估模型</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <i class="fas fa-robot text-white"></i>
                    </div>
                    <span class="text-white/90">支持 5 大主流 AI 模型</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <i class="fas fa-magic text-white"></i>
                    </div>
                    <span class="text-white/90">AI 驱动的智能优化建议</span>
                </div>
            </div>
            <div class="flex items-center space-x-4 mt-8">
                <div class="flex -space-x-3">
                    <div class="w-10 h-10 bg-blue-400 rounded-full border-2 border-white flex items-center justify-center text-white text-sm font-bold">A</div>
                    <div class="w-10 h-10 bg-green-400 rounded-full border-2 border-white flex items-center justify-center text-white text-sm font-bold">B</div>
                    <div class="w-10 h-10 bg-yellow-400 rounded-full border-2 border-white flex items-center justify-center text-white text-sm font-bold">C</div>
                </div>
                <span class="text-white/80 text-sm">已有 1,000+ 企业信赖</span>
            </div>
        </div>
        <div class="relative z-10 text-white/60 text-sm">
            © 2026 GCore. All rights reserved.
        </div>
    </div>

    <!-- 右侧登录表单 -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
        <div class="w-full max-w-md">
            <div class="lg:hidden flex items-center space-x-3 mb-8">
                <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-xl">G</span>
                </div>
                <span class="text-white font-bold text-xl">GCore</span>
            </div>

            <h2 class="text-3xl font-bold text-white mb-2">欢迎回来</h2>
            <p class="text-gray-400 mb-8">登录您的账户以继续使用 GCore 平台</p>

            <!-- Google 登录 -->
            <div class="mb-6">
                <button id="googleLoginBtn" class="w-full bg-white text-gray-800 py-4 px-4 rounded-xl font-medium flex items-center justify-center space-x-3 hover:bg-gray-100 transition disabled:opacity-50 disabled:cursor-not-allowed shadow-lg">
                    <svg class="w-6 h-6" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    <span id="googleBtnText">使用 Google 账号登录</span>
                </button>
            </div>

            <!-- 错误提示 -->
            <div id="errorAlert" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl mb-4">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorMessage"></span>
            </div>

            <p class="text-gray-500 text-sm text-center mt-6">
                首次登录将自动创建账户
            </p>

            <p class="text-gray-600 text-xs text-center mt-4">
                点击登录即表示您同意我们的 <a href="#" class="text-indigo-400 hover:underline">服务条款</a> 和 <a href="#" class="text-indigo-400 hover:underline">隐私政策</a>
            </p>

            <!-- 返回首页 -->
            <div class="mt-8 text-center">
                <a href="index.html" class="text-gray-500 hover:text-gray-300 text-sm">← 返回首页</a>
            </div>
        </div>
    </div>

    <script>
        // 显示错误信息
        function showError(message) {
            const alert = document.getElementById('errorAlert');
            const msgEl = document.getElementById('errorMessage');
            msgEl.textContent = message;
            alert.classList.remove('hidden');
            setTimeout(() => alert.classList.add('hidden'), 5000);
        }

        // Google 登录
        document.getElementById('googleLoginBtn').addEventListener('click', async function() {
            const btn = this;
            const btnText = document.getElementById('googleBtnText');
            
            btn.disabled = true;
            btnText.textContent = '登录中...';
            
            try {
                const result = await GeoAuth.signInWithGoogle();
                
                if (result.success) {
                    window.location.href = 'app/dashboard.html';
                } else {
                    // 显示详细错误信息（开发模式）
                    let errorMsg = result.error;
                    if (result.code) {
                        errorMsg += ` (${result.code})`;
                    }
                    showError(errorMsg);
                    console.error('登录失败详情:', result);
                    btn.disabled = false;
                    btnText.textContent = '使用 Google 账号登录';
                }
            } catch (error) {
                showError('登录失败: ' + error.message);
                console.error('登录异常:', error);
                btn.disabled = false;
                btnText.textContent = '使用 Google 账号登录';
            }
        });

        // 检查是否已登录 (异步验证 Firebase 状态)
        (async function checkAuth() {
            try {
                await GeoAuth.initFirebase();
                // Firebase 会通过 onAuthStateChanged 自动更新 localStorage
                // 等待一小段时间让 Firebase 初始化完成
                setTimeout(() => {
                    if (GeoAuth.isLoggedIn()) {
                        window.location.href = 'app/dashboard.html';
                    }
                }, 500);
            } catch (e) {
                console.log('未登录');
            }
        })();
    </script>
</body>
</html>
