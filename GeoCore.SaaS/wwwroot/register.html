<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - GCore AI 可见度平台</title>
    <!-- 第三方登录不需要单独注册页面，重定向到登录页 -->
    <script>window.location.replace('login.html');</script>
</head>
<body class="bg-gray-900 min-h-screen flex">
    <!-- 左侧介绍 -->
    <div class="hidden lg:flex lg:w-1/2 gradient-bg p-12 flex-col justify-between relative overflow-hidden">
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-20 left-10 w-64 h-64 bg-white rounded-full filter blur-[80px]"></div>
            <div class="absolute bottom-20 right-10 w-80 h-80 bg-purple-300 rounded-full filter blur-[100px]"></div>
        </div>
        <div class="relative z-10">
            <div class="flex items-center space-x-3">
                <img src="images/logo-white.svg" alt="GeoCore AI" class="h-10">
            </div>
        </div>
        <div class="relative z-10">
            <h1 class="text-4xl font-bold text-white mb-6">
                开启您的<br>AI 可见度之旅
            </h1>
            <p class="text-white/80 text-lg mb-8">
                注册 GeoCore 账户，体验 AI 时代的品牌可见度革命。
            </p>
            <div class="space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-check text-white text-sm"></i>
                    </div>
                    <span class="text-white/90">免费创建 1 个项目</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-check text-white text-sm"></i>
                    </div>
                    <span class="text-white/90">支持 3 个主流 AI 模型</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-check text-white text-sm"></i>
                    </div>
                    <span class="text-white/90">基础 SHEEP 评估报告</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-check text-white text-sm"></i>
                    </div>
                    <span class="text-white/90">无需信用卡</span>
                </div>
            </div>
        </div>
        <div class="relative z-10 text-white/60 text-sm">
            © 2026 GCore. All rights reserved.
        </div>
    </div>

    <!-- 右侧注册表单 -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
        <div class="w-full max-w-md">
            <div class="lg:hidden flex items-center space-x-3 mb-8">
                <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-xl">G</span>
                </div>
                <span class="text-white font-bold text-xl">GCore</span>
            </div>

            <h2 class="text-3xl font-bold text-white mb-2">创建账户</h2>
            <p class="text-gray-400 mb-8">使用 Google 账号快速开始您的 GCore 之旅</p>

            <!-- Google 注册 -->
            <div class="mb-6">
                <button id="googleRegisterBtn" class="w-full bg-white text-gray-800 py-4 px-4 rounded-xl font-medium flex items-center justify-center space-x-3 hover:bg-gray-100 transition disabled:opacity-50 disabled:cursor-not-allowed shadow-lg">
                    <svg class="w-6 h-6" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    <span id="googleBtnText">使用 Google 账号注册</span>
                </button>
            </div>

            <!-- 错误提示 -->
            <div id="errorAlert" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl mb-4">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorMessage"></span>
            </div>

            <p class="text-gray-600 text-xs text-center mt-6">
                点击注册即表示您同意我们的 <a href="#" class="text-indigo-400 hover:underline">服务条款</a> 和 <a href="#" class="text-indigo-400 hover:underline">隐私政策</a>
            </p>

            <p class="text-gray-500 text-sm text-center mt-6">
                已有账户？<a href="login.html" class="text-indigo-400 hover:underline">立即登录</a>
            </p>

            <!-- 返回首页 -->
            <div class="mt-8 text-center">
                <a href="index.html" class="text-gray-500 hover:text-gray-300 text-sm">← 返回首页</a>
            </div>
        </div>
    </div>

    <script>
        // 显示错误信息
        function showError(message) {
            const alert = document.getElementById('errorAlert');
            const msgEl = document.getElementById('errorMessage');
            msgEl.textContent = message;
            alert.classList.remove('hidden');
            setTimeout(() => alert.classList.add('hidden'), 5000);
        }

        // Google 注册/登录
        document.getElementById('googleRegisterBtn').addEventListener('click', async function() {
            const btn = this;
            const btnText = document.getElementById('googleBtnText');
            
            btn.disabled = true;
            btnText.textContent = '注册中...';
            
            try {
                const result = await GeoAuth.signInWithGoogle();
                
                if (result.success) {
                    // 新用户跳转到设置向导
                    window.location.href = 'app/setup-wizard.html';
                } else {
                    showError(result.error);
                    btn.disabled = false;
                    btnText.textContent = '使用 Google 账号注册';
                }
            } catch (error) {
                showError('注册失败，请重试');
                btn.disabled = false;
                btnText.textContent = '使用 Google 账号注册';
            }
        });

        // 检查是否已登录 (异步验证 Firebase 状态)
        (async function checkAuth() {
            try {
                await GeoAuth.initFirebase();
                setTimeout(() => {
                    if (GeoAuth.isLoggedIn()) {
                        window.location.href = 'app/dashboard.html';
                    }
                }, 500);
            } catch (e) {
                console.log('未登录');
            }
        })();
    </script>
</body>
</html>
