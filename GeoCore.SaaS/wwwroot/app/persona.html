<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona 买家角色 - GEO Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .persona-card { transition: all 0.3s ease; }
        .persona-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .journey-stage { border-left: 3px solid #3b82f6; }
        .matrix-cell { transition: all 0.2s ease; }
        .matrix-cell:hover { transform: scale(1.05); }
        .level-high { background: linear-gradient(135deg, #10b981, #059669); }
        .level-medium { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .level-low { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .level-none { background: linear-gradient(135deg, #6b7280, #4b5563); }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .insight-gap { border-left: 4px solid #ef4444; }
        .insight-strength { border-left: 4px solid #10b981; }
        .insight-opportunity { border-left: 4px solid #f59e0b; }
        .question-card { border-left: 4px solid #8b5cf6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="flex">
        <!-- Sidebar -->
        <nav id="sidebar" class="w-64 bg-white shadow-lg h-screen fixed"></nav>

        <!-- Main Content -->
        <main class="flex-1 ml-64 p-8">
            <div class="max-w-7xl mx-auto">
                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
                        <i class="fas fa-users text-blue-500"></i>
                        Persona 买家角色
                    </h1>
                    <p class="text-gray-600 mt-2">自动生成买家角色、深度画像、反推问题和可见度矩阵</p>
                </div>

                <!-- Tabs -->
                <div class="flex border-b border-gray-200 mb-6">
                    <button onclick="switchTab('generate')" id="tab-generate" class="px-6 py-3 font-medium tab-active">
                        <i class="fas fa-magic mr-2"></i>生成角色
                    </button>
                    <button onclick="switchTab('questions')" id="tab-questions" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700">
                        <i class="fas fa-question-circle mr-2"></i>反推问题
                    </button>
                    <button onclick="switchTab('matrix')" id="tab-matrix" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700">
                        <i class="fas fa-th mr-2"></i>可见度矩阵
                    </button>
                </div>

                <!-- Tab: Generate Personas -->
                <div id="panel-generate" class="tab-panel">
                    <!-- Input Form -->
                    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                        <h2 class="text-lg font-semibold mb-4">品牌信息</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">品牌名称 *</label>
                                <input type="text" id="brand" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="如：Apple">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">产品/服务</label>
                                <input type="text" id="product" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="如：iPhone">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">行业</label>
                                <input type="text" id="industry" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="如：消费电子">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">品牌描述</label>
                                <textarea id="description" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="简要描述品牌定位和核心价值"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">生成数量</label>
                                <select id="count" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                                    <option value="3">3 个角色</option>
                                    <option value="4">4 个角色</option>
                                    <option value="5">5 个角色</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 flex gap-3">
                            <button onclick="generatePersonas()" class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 flex items-center gap-2">
                                <i class="fas fa-magic"></i>
                                生成买家角色
                            </button>
                            <button onclick="clearResults()" class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">
                                清空结果
                            </button>
                        </div>
                    </div>

                    <!-- Loading -->
                    <div id="loading" class="hidden text-center py-12">
                        <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                        <p class="mt-4 text-gray-600">正在生成买家角色...</p>
                    </div>

                    <!-- Results -->
                    <div id="results" class="hidden">
                        <!-- Summary -->
                        <div id="summary" class="bg-gradient-to-r from-blue-500 to-purple-500 text-white rounded-xl p-6 mb-6">
                            <h3 class="text-lg font-semibold mb-2">生成摘要</h3>
                            <p id="summary-text"></p>
                        </div>

                        <!-- Persona Cards -->
                        <div id="persona-cards" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                    </div>
                </div>

                <!-- Tab: Questions -->
                <div id="panel-questions" class="tab-panel hidden">
                    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                        <h2 class="text-lg font-semibold mb-4">问题生成设置</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">品牌名称 *</label>
                                <input type="text" id="q-brand" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="如：Apple">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">每个角色问题数</label>
                                <select id="q-count" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                                    <option value="3">3 个问题</option>
                                    <option value="5" selected>5 个问题</option>
                                    <option value="10">10 个问题</option>
                                </select>
                            </div>
                            <div class="flex items-end">
                                <button onclick="generateQuestions()" class="w-full px-6 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600 flex items-center justify-center gap-2">
                                    <i class="fas fa-question-circle"></i>
                                    生成问题
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="questions-loading" class="hidden text-center py-12">
                        <i class="fas fa-spinner fa-spin text-4xl text-purple-500"></i>
                        <p class="mt-4 text-gray-600">正在从角色视角反推问题...</p>
                    </div>

                    <div id="questions-results" class="hidden space-y-6"></div>
                </div>

                <!-- Tab: Visibility Matrix -->
                <div id="panel-matrix" class="tab-panel hidden">
                    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                        <h2 class="text-lg font-semibold mb-4">可见度矩阵设置</h2>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">监测任务 ID *</label>
                                <input type="number" id="m-taskId" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="任务ID">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">品牌名称 *</label>
                                <input type="text" id="m-brand" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="如：Apple">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">行业</label>
                                <input type="text" id="m-industry" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="如：科技">
                            </div>
                            <div class="flex items-end">
                                <button onclick="generateMatrix()" class="w-full px-6 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 flex items-center justify-center gap-2">
                                    <i class="fas fa-th"></i>
                                    生成矩阵
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="matrix-loading" class="hidden text-center py-12">
                        <i class="fas fa-spinner fa-spin text-4xl text-green-500"></i>
                        <p class="mt-4 text-gray-600">正在计算可见度矩阵...</p>
                    </div>

                    <div id="matrix-results" class="hidden">
                        <!-- Overall Score -->
                        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <h3 class="text-lg font-semibold">整体可见度</h3>
                                    <p class="text-gray-500 text-sm">所有角色在所有话题的平均可见度</p>
                                </div>
                                <div id="overall-score" class="text-4xl font-bold text-blue-500">0%</div>
                            </div>
                        </div>

                        <!-- Matrix Grid -->
                        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 overflow-x-auto">
                            <h3 class="text-lg font-semibold mb-4">可见度矩阵</h3>
                            <div id="matrix-grid"></div>
                        </div>

                        <!-- Insights -->
                        <div class="bg-white rounded-xl shadow-sm p-6">
                            <h3 class="text-lg font-semibold mb-4">洞察与建议</h3>
                            <div id="matrix-insights" class="space-y-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Persona Detail Modal -->
    <div id="persona-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-start mb-6">
                    <div class="flex items-center gap-4">
                        <span id="modal-icon" class="text-4xl"></span>
                        <div>
                            <h2 id="modal-name" class="text-2xl font-bold"></h2>
                            <p id="modal-title" class="text-gray-500"></p>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <div id="modal-content"></div>
            </div>
        </div>
    </div>

    <script src="js/navigation.js"></script>
    <script>
        let currentPersonas = [];

        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(t => {
                t.classList.remove('tab-active');
                t.classList.add('text-gray-500');
            });
            
            document.getElementById(`panel-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            document.getElementById(`tab-${tab}`).classList.remove('text-gray-500');
        }

        async function generatePersonas() {
            const brand = document.getElementById('brand').value.trim();
            const product = document.getElementById('product').value.trim();
            const industry = document.getElementById('industry').value.trim();
            const description = document.getElementById('description').value.trim();
            const count = parseInt(document.getElementById('count').value);

            if (!brand && !industry) {
                alert('请至少填写品牌名称或行业');
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                const response = await fetch('/api/persona/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        brand, product, industry, description, count,
                        includeDeepProfile: true,
                        generateQuestions: true,
                        questionsPerPersona: 5
                    })
                });

                const result = await response.json();
                if (result.success) {
                    currentPersonas = result.data.personas;
                    renderPersonas(result.data);
                } else {
                    alert(result.error || '生成失败');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('请求失败，请重试');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderPersonas(data) {
            document.getElementById('summary-text').textContent = data.summary;
            
            const container = document.getElementById('persona-cards');
            container.innerHTML = data.personas.map((p, idx) => `
                <div class="persona-card bg-white rounded-xl shadow-sm p-6 cursor-pointer" onclick="showPersonaDetail(${idx})">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-3xl">${p.icon}</span>
                        <div>
                            <h3 class="font-semibold text-lg">${p.name}</h3>
                            <p class="text-gray-500 text-sm">${p.title}</p>
                        </div>
                    </div>
                    <p class="text-gray-600 text-sm mb-4">${p.description}</p>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs">${getRoleTypeName(p.roleType)}</span>
                        <span class="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs">${p.ageRange || '未知年龄'}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div class="flex items-center gap-1 text-gray-500">
                            <i class="fas fa-bullseye text-green-500"></i>
                            <span>${p.profile.goals.length} 个目标</span>
                        </div>
                        <div class="flex items-center gap-1 text-gray-500">
                            <i class="fas fa-exclamation-triangle text-red-500"></i>
                            <span>${p.profile.painPoints.length} 个痛点</span>
                        </div>
                        <div class="flex items-center gap-1 text-gray-500">
                            <i class="fas fa-question-circle text-purple-500"></i>
                            <span>${p.questions.length} 个问题</span>
                        </div>
                        <div class="flex items-center gap-1 text-gray-500">
                            <i class="fas fa-search text-blue-500"></i>
                            <span>${p.profile.searchKeywords.length} 个关键词</span>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('results').classList.remove('hidden');
        }

        function showPersonaDetail(idx) {
            const p = currentPersonas[idx];
            document.getElementById('modal-icon').textContent = p.icon;
            document.getElementById('modal-name').textContent = p.name;
            document.getElementById('modal-title').textContent = p.title;

            const content = `
                <div class="space-y-6">
                    <!-- Basic Info -->
                    <div class="flex flex-wrap gap-2">
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm">${getRoleTypeName(p.roleType)}</span>
                        <span class="px-3 py-1 bg-gray-100 text-gray-700 rounded-full text-sm">${p.ageRange || '未知年龄'}</span>
                    </div>

                    <!-- Goals -->
                    <div>
                        <h4 class="font-semibold text-green-600 mb-2"><i class="fas fa-bullseye mr-2"></i>目标</h4>
                        <ul class="space-y-1">
                            ${p.profile.goals.map(g => `<li class="flex items-start gap-2"><i class="fas fa-check text-green-500 mt-1"></i>${g}</li>`).join('')}
                        </ul>
                    </div>

                    <!-- Pain Points -->
                    <div>
                        <h4 class="font-semibold text-red-600 mb-2"><i class="fas fa-exclamation-triangle mr-2"></i>痛点</h4>
                        <ul class="space-y-1">
                            ${p.profile.painPoints.map(pp => `<li class="flex items-start gap-2"><i class="fas fa-times text-red-500 mt-1"></i>${pp}</li>`).join('')}
                        </ul>
                    </div>

                    <!-- Decision Factors -->
                    <div>
                        <h4 class="font-semibold text-blue-600 mb-2"><i class="fas fa-balance-scale mr-2"></i>决策因素</h4>
                        <div class="flex flex-wrap gap-2">
                            ${p.profile.decisionFactors.map(f => `<span class="px-2 py-1 bg-blue-50 text-blue-700 rounded text-sm">${f}</span>`).join('')}
                        </div>
                    </div>

                    <!-- Information Sources -->
                    <div>
                        <h4 class="font-semibold text-purple-600 mb-2"><i class="fas fa-info-circle mr-2"></i>信息来源</h4>
                        <div class="flex flex-wrap gap-2">
                            ${p.profile.informationSources.map(s => `<span class="px-2 py-1 bg-purple-50 text-purple-700 rounded text-sm">${s}</span>`).join('')}
                        </div>
                    </div>

                    <!-- Search Keywords -->
                    <div>
                        <h4 class="font-semibold text-orange-600 mb-2"><i class="fas fa-search mr-2"></i>搜索关键词</h4>
                        <div class="flex flex-wrap gap-2">
                            ${p.profile.searchKeywords.map(k => `<span class="px-2 py-1 bg-orange-50 text-orange-700 rounded text-sm">${k}</span>`).join('')}
                        </div>
                    </div>

                    <!-- Decision Journey -->
                    <div>
                        <h4 class="font-semibold text-indigo-600 mb-3"><i class="fas fa-route mr-2"></i>决策旅程</h4>
                        <div class="space-y-4">
                            ${renderJourneyStage(p.profile.decisionJourney.awareness, '认知阶段', 'bg-blue-500')}
                            ${renderJourneyStage(p.profile.decisionJourney.consideration, '考虑阶段', 'bg-yellow-500')}
                            ${renderJourneyStage(p.profile.decisionJourney.decision, '决策阶段', 'bg-green-500')}
                        </div>
                    </div>

                    <!-- Questions -->
                    ${p.questions.length > 0 ? `
                    <div>
                        <h4 class="font-semibold text-violet-600 mb-3"><i class="fas fa-question-circle mr-2"></i>典型问题</h4>
                        <div class="space-y-2">
                            ${p.questions.map(q => `
                                <div class="question-card bg-violet-50 p-3 rounded-lg">
                                    <p class="font-medium">${q.question}</p>
                                    <div class="flex gap-2 mt-2 text-xs">
                                        <span class="px-2 py-0.5 bg-white rounded">${getIntentName(q.intent)}</span>
                                        <span class="px-2 py-0.5 bg-white rounded">${getStageName(q.stage)}</span>
                                        <span class="px-2 py-0.5 bg-violet-200 rounded">机会分: ${q.brandOpportunityScore}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('persona-modal').classList.remove('hidden');
        }

        function renderJourneyStage(stage, name, color) {
            if (!stage) return '';
            return `
                <div class="journey-stage pl-4 py-2">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-3 h-3 ${color} rounded-full"></span>
                        <span class="font-medium">${name}</span>
                    </div>
                    ${stage.typicalQuestions?.length > 0 ? `
                        <div class="ml-5 text-sm text-gray-600">
                            <p class="font-medium text-gray-700">典型问题：</p>
                            <ul class="list-disc ml-4">
                                ${stage.typicalQuestions.map(q => `<li>${q}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('persona-modal').classList.add('hidden');
        }

        async function generateQuestions() {
            const brand = document.getElementById('q-brand').value.trim();
            const count = parseInt(document.getElementById('q-count').value);

            if (!brand) {
                alert('请填写品牌名称');
                return;
            }

            document.getElementById('questions-loading').classList.remove('hidden');
            document.getElementById('questions-results').classList.add('hidden');

            try {
                const response = await fetch('/api/persona/questions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        brand,
                        questionsPerPersona: count,
                        personaCount: 3
                    })
                });

                const result = await response.json();
                if (result.success) {
                    renderQuestions(result.data);
                } else {
                    alert(result.error || '生成失败');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('请求失败，请重试');
            } finally {
                document.getElementById('questions-loading').classList.add('hidden');
            }
        }

        function renderQuestions(data) {
            const container = document.getElementById('questions-results');
            
            container.innerHTML = `
                <div class="bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-xl p-6 mb-6">
                    <h3 class="text-lg font-semibold">问题生成结果</h3>
                    <p>品牌「${data.brand}」共生成 ${data.totalQuestions} 个问题</p>
                </div>
                ${data.personaQuestions.map(pq => `
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="text-2xl">${pq.persona.icon}</span>
                            <div>
                                <h3 class="font-semibold">${pq.persona.name}</h3>
                                <p class="text-gray-500 text-sm">${pq.persona.title}</p>
                            </div>
                        </div>
                        <div class="space-y-3">
                            ${pq.questions.map(q => `
                                <div class="question-card bg-gray-50 p-4 rounded-lg">
                                    <p class="font-medium mb-2">${q.question}</p>
                                    <p class="text-sm text-gray-600 mb-2">${q.motivation}</p>
                                    <div class="flex flex-wrap gap-2 text-xs">
                                        <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded">${getIntentName(q.intent)}</span>
                                        <span class="px-2 py-1 bg-green-100 text-green-700 rounded">${getStageName(q.stage)}</span>
                                        <span class="px-2 py-1 bg-purple-100 text-purple-700 rounded">机会分: ${q.brandOpportunityScore}/10</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('')}
            `;

            container.classList.remove('hidden');
        }

        async function generateMatrix() {
            const taskId = parseInt(document.getElementById('m-taskId').value);
            const brand = document.getElementById('m-brand').value.trim();
            const industry = document.getElementById('m-industry').value.trim();

            if (!taskId || !brand) {
                alert('请填写任务ID和品牌名称');
                return;
            }

            document.getElementById('matrix-loading').classList.remove('hidden');
            document.getElementById('matrix-results').classList.add('hidden');

            try {
                const response = await fetch('/api/persona/visibility-matrix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        taskId, brand, industry,
                        personaCount: 3
                    })
                });

                const result = await response.json();
                if (result.success) {
                    renderMatrix(result.data);
                } else {
                    alert(result.error || '生成失败');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('请求失败，请重试');
            } finally {
                document.getElementById('matrix-loading').classList.add('hidden');
            }
        }

        function renderMatrix(data) {
            document.getElementById('overall-score').textContent = `${data.overallVisibility.toFixed(1)}%`;

            // Render matrix grid
            const grid = document.getElementById('matrix-grid');
            let html = '<table class="w-full text-sm">';
            html += '<thead><tr><th class="p-2 text-left"></th>';
            data.topics.forEach(t => {
                html += `<th class="p-2 text-center">${t}</th>`;
            });
            html += '<th class="p-2 text-center font-bold">平均</th></tr></thead><tbody>';

            data.personaNames.forEach(persona => {
                html += `<tr><td class="p-2 font-medium">${persona}</td>`;
                data.topics.forEach(topic => {
                    const cell = data.cells.find(c => c.personaName === persona && c.topic === topic);
                    if (cell) {
                        html += `<td class="p-2 text-center">
                            <div class="matrix-cell inline-block px-3 py-1 rounded level-${cell.level} text-white">
                                ${cell.visibilityScore.toFixed(0)}%
                            </div>
                        </td>`;
                    } else {
                        html += '<td class="p-2 text-center">-</td>';
                    }
                });
                const avg = data.personaAverages[persona] || 0;
                html += `<td class="p-2 text-center font-bold">${avg.toFixed(1)}%</td></tr>`;
            });

            html += '<tr class="border-t"><td class="p-2 font-bold">平均</td>';
            data.topics.forEach(topic => {
                const avg = data.topicAverages[topic] || 0;
                html += `<td class="p-2 text-center font-bold">${avg.toFixed(1)}%</td>`;
            });
            html += '<td></td></tr>';
            html += '</tbody></table>';

            grid.innerHTML = html;

            // Render insights
            const insightsContainer = document.getElementById('matrix-insights');
            if (data.insights.length === 0) {
                insightsContainer.innerHTML = '<p class="text-gray-500">暂无洞察</p>';
            } else {
                insightsContainer.innerHTML = data.insights.map(i => `
                    <div class="insight-${i.type} bg-gray-50 p-4 rounded-lg">
                        <div class="flex items-start gap-3">
                            <i class="fas ${getInsightIcon(i.type)} text-lg mt-1"></i>
                            <div>
                                <h4 class="font-semibold">${i.title}</h4>
                                <p class="text-gray-600 text-sm mt-1">${i.description}</p>
                                <p class="text-blue-600 text-sm mt-2"><i class="fas fa-lightbulb mr-1"></i>${i.suggestedAction}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            document.getElementById('matrix-results').classList.remove('hidden');
        }

        function clearResults() {
            document.getElementById('results').classList.add('hidden');
            currentPersonas = [];
        }

        function getRoleTypeName(type) {
            const names = {
                'decision_maker': '决策者',
                'influencer': '影响者',
                'end_user': '最终用户',
                'gatekeeper': '把关人',
                'champion': '支持者',
                'evaluator': '评估者'
            };
            return names[type] || type;
        }

        function getIntentName(intent) {
            const names = {
                'informational': '信息型',
                'commercial': '商业型',
                'transactional': '交易型',
                'navigational': '导航型'
            };
            return names[intent] || intent;
        }

        function getStageName(stage) {
            const names = {
                'awareness': '认知阶段',
                'consideration': '考虑阶段',
                'decision': '决策阶段',
                'post_purchase': '购买后'
            };
            return names[stage] || stage;
        }

        function getInsightIcon(type) {
            const icons = {
                'gap': 'fa-exclamation-circle text-red-500',
                'strength': 'fa-check-circle text-green-500',
                'opportunity': 'fa-lightbulb text-yellow-500',
                'risk': 'fa-exclamation-triangle text-orange-500'
            };
            return icons[type] || 'fa-info-circle text-blue-500';
        }

        // Close modal on outside click
        document.getElementById('persona-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
