<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平台依赖度分析 - GEO Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div id="sidebar" class="w-64 bg-gray-900 text-white flex-shrink-0"></div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Header -->
            <header class="bg-white shadow-sm border-b border-gray-200 px-6 py-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">平台依赖度分析</h1>
                        <p class="text-sm text-gray-500 mt-1">监测品牌在各 AI 平台的曝光分布，避免过度依赖单一平台</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <select id="taskSelect" class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                            <option value="">选择监测任务...</option>
                        </select>
                        <input type="text" id="brandInput" placeholder="品牌名称" 
                               class="border border-gray-300 rounded-lg px-4 py-2 w-48 focus:ring-2 focus:ring-blue-500">
                        <button onclick="generateReport()" 
                                class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                            <i class="fas fa-chart-pie mr-2"></i>分析依赖度
                        </button>
                    </div>
                </div>
            </header>

            <!-- Content -->
            <main class="p-6">
                <!-- Loading State -->
                <div id="loadingState" class="hidden">
                    <div class="flex items-center justify-center h-64">
                        <div class="text-center">
                            <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                            <p class="text-gray-600">正在分析平台依赖度...</p>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="text-center py-16">
                    <i class="fas fa-network-wired text-6xl text-gray-300 mb-4"></i>
                    <h3 class="text-xl font-medium text-gray-600 mb-2">选择任务开始分析</h3>
                    <p class="text-gray-500">分析品牌在各 AI 平台的曝光分布，识别过度依赖风险</p>
                    <div class="mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg max-w-lg mx-auto text-left">
                        <h4 class="font-medium text-yellow-800 mb-2">
                            <i class="fas fa-lightbulb mr-2"></i>为什么要监测平台依赖度？
                        </h4>
                        <p class="text-sm text-yellow-700">
                            根据 Barry Schwartz 20年观察：平台会周期性衰落（Yahoo Answers→Quora→Wikipedia→Reddit）。
                            过度依赖单一平台会带来风险，需要分散曝光渠道。
                        </p>
                    </div>
                </div>

                <!-- Report Content -->
                <div id="reportContent" class="hidden space-y-6">
                    <!-- Alerts -->
                    <div id="alertsContainer" class="space-y-3"></div>

                    <!-- Summary Card -->
                    <div id="summaryCard" class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl p-6 text-white">
                        <div class="flex items-start justify-between">
                            <div>
                                <h2 class="text-xl font-semibold mb-2">
                                    <i class="fas fa-balance-scale mr-2"></i>分散度概览
                                </h2>
                                <p id="reportSummary" class="text-indigo-100 leading-relaxed"></p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm text-indigo-200">生成时间</p>
                                <p id="reportTime" class="font-medium"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Score and Level -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 col-span-1">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="font-semibold text-gray-900">分散度评分</h3>
                                <span id="dependencyLevel" class="px-3 py-1 rounded-full text-sm font-medium"></span>
                            </div>
                            <div class="flex items-center justify-center">
                                <div class="relative w-32 h-32">
                                    <canvas id="scoreGauge"></canvas>
                                    <div class="absolute inset-0 flex items-center justify-center">
                                        <span id="diversificationScore" class="text-3xl font-bold text-gray-900"></span>
                                    </div>
                                </div>
                            </div>
                            <p class="text-center text-sm text-gray-500 mt-2">分数越高，分散越均衡</p>
                        </div>

                        <!-- Platform Distribution Chart -->
                        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 col-span-2">
                            <h3 class="font-semibold text-gray-900 mb-4">
                                <i class="fas fa-chart-pie text-blue-600 mr-2"></i>平台曝光分布
                            </h3>
                            <div class="h-48">
                                <canvas id="distributionChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Platform Details -->
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <h3 class="text-lg font-semibold text-gray-900 mb-4">
                            <i class="fas fa-server text-green-600 mr-2"></i>平台详情
                        </h3>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="border-b border-gray-200">
                                        <th class="text-left py-3 px-4 text-sm font-medium text-gray-600">平台</th>
                                        <th class="text-center py-3 px-4 text-sm font-medium text-gray-600">引用次数</th>
                                        <th class="text-center py-3 px-4 text-sm font-medium text-gray-600">曝光占比</th>
                                        <th class="text-center py-3 px-4 text-sm font-medium text-gray-600">健康度</th>
                                        <th class="text-center py-3 px-4 text-sm font-medium text-gray-600">生命周期</th>
                                        <th class="text-center py-3 px-4 text-sm font-medium text-gray-600">风险等级</th>
                                        <th class="text-center py-3 px-4 text-sm font-medium text-gray-600">趋势</th>
                                    </tr>
                                </thead>
                                <tbody id="platformsTableBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Trend Chart -->
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold text-gray-900">
                                <i class="fas fa-chart-line text-purple-600 mr-2"></i>分散度趋势
                            </h3>
                            <span id="trendDirection" class="px-3 py-1 rounded-full text-sm font-medium"></span>
                        </div>
                        <div class="h-64">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>

                    <!-- Strategies -->
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                        <h3 class="text-lg font-semibold text-gray-900 mb-4">
                            <i class="fas fa-lightbulb text-yellow-600 mr-2"></i>分散策略建议
                        </h3>
                        <div id="strategiesContainer" class="space-y-4"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/navigation.js"></script>
    <script>
        let distributionChart = null;
        let trendChart = null;
        let scoreGauge = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadTasks();
        });

        async function loadTasks() {
            try {
                const response = await fetch('/api/citation-monitoring/tasks');
                const data = await response.json();
                const select = document.getElementById('taskSelect');
                
                if (data.success && data.data) {
                    data.data.forEach(task => {
                        const option = document.createElement('option');
                        option.value = task.id;
                        option.textContent = `${task.brand} - ${task.name || '监测任务'}`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Failed to load tasks:', error);
            }
        }

        async function generateReport() {
            const taskId = document.getElementById('taskSelect').value;
            const brand = document.getElementById('brandInput').value.trim();

            if (!taskId) {
                alert('请选择监测任务');
                return;
            }
            if (!brand) {
                alert('请输入品牌名称');
                return;
            }

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('reportContent').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');

            try {
                const response = await fetch('/api/platform-dependency/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        taskId: parseInt(taskId),
                        brand,
                        includeTrends: true,
                        includeStrategies: true,
                        dependencyThreshold: 0.5
                    })
                });

                const data = await response.json();

                if (data.success) {
                    renderReport(data.data);
                } else {
                    alert(data.error || '生成报告失败');
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Failed to generate report:', error);
                alert('生成报告失败，请重试');
                document.getElementById('emptyState').classList.remove('hidden');
            } finally {
                document.getElementById('loadingState').classList.add('hidden');
            }
        }

        function renderReport(report) {
            document.getElementById('reportContent').classList.remove('hidden');

            // Alerts
            renderAlerts(report.alerts);

            // Summary
            document.getElementById('reportSummary').textContent = report.summary;
            document.getElementById('reportTime').textContent = new Date(report.generatedAt).toLocaleString('zh-CN');

            // Score
            document.getElementById('diversificationScore').textContent = report.diversificationScore.toFixed(0);
            const levelEl = document.getElementById('dependencyLevel');
            levelEl.textContent = getLevelLabel(report.dependencyLevel);
            levelEl.className = `px-3 py-1 rounded-full text-sm font-medium ${getLevelClass(report.dependencyLevel)}`;

            // Charts
            renderScoreGauge(report.diversificationScore);
            renderDistributionChart(report.platforms);
            renderTrendChart(report.trend);

            // Trend direction
            const trendEl = document.getElementById('trendDirection');
            trendEl.textContent = getTrendLabel(report.trend.direction);
            trendEl.className = `px-3 py-1 rounded-full text-sm font-medium ${getTrendClass(report.trend.direction)}`;

            // Platforms
            renderPlatforms(report.platforms);

            // Strategies
            renderStrategies(report.strategies);
        }

        function renderAlerts(alerts) {
            const container = document.getElementById('alertsContainer');
            container.innerHTML = '';

            (alerts || []).forEach(alert => {
                const alertClass = {
                    'critical': 'bg-red-50 border-red-200 text-red-800',
                    'warning': 'bg-yellow-50 border-yellow-200 text-yellow-800',
                    'info': 'bg-blue-50 border-blue-200 text-blue-800'
                }[alert.level] || 'bg-gray-50 border-gray-200 text-gray-800';

                const iconClass = {
                    'critical': 'fa-exclamation-circle text-red-600',
                    'warning': 'fa-exclamation-triangle text-yellow-600',
                    'info': 'fa-info-circle text-blue-600'
                }[alert.level] || 'fa-info-circle text-gray-600';

                container.innerHTML += `
                    <div class="border rounded-lg p-4 ${alertClass}">
                        <div class="flex items-start">
                            <i class="fas ${iconClass} mt-0.5 mr-3"></i>
                            <div class="flex-1">
                                <h4 class="font-medium">${alert.title}</h4>
                                <p class="text-sm mt-1 opacity-80">${alert.description}</p>
                                <p class="text-sm mt-2"><strong>建议:</strong> ${alert.suggestedAction}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderScoreGauge(score) {
            const ctx = document.getElementById('scoreGauge').getContext('2d');
            if (scoreGauge) scoreGauge.destroy();

            const normalizedScore = score / 100;
            const color = score >= 70 ? '#10B981' : score >= 50 ? '#F59E0B' : '#EF4444';

            scoreGauge = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [normalizedScore, 1 - normalizedScore],
                        backgroundColor: [color, '#E5E7EB'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    rotation: -90,
                    circumference: 180,
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        function renderDistributionChart(platforms) {
            const ctx = document.getElementById('distributionChart').getContext('2d');
            if (distributionChart) distributionChart.destroy();

            const colors = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#6366F1', '#14B8A6'];

            distributionChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: platforms.map(p => p.displayName),
                    datasets: [{
                        data: platforms.map(p => p.citationCount),
                        backgroundColor: colors.slice(0, platforms.length)
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right' } }
                }
            });
        }

        function renderTrendChart(trend) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();

            const dataPoints = trend.dataPoints || [];

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataPoints.map(p => new Date(p.date).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' })),
                    datasets: [{
                        label: '分散度评分',
                        data: dataPoints.map(p => p.diversificationScore),
                        borderColor: '#8B5CF6',
                        backgroundColor: 'rgba(139, 92, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { min: 0, max: 100 } }
                }
            });
        }

        function renderPlatforms(platforms) {
            const tbody = document.getElementById('platformsTableBody');
            tbody.innerHTML = '';

            platforms.forEach(platform => {
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-100 hover:bg-gray-50';
                row.innerHTML = `
                    <td class="py-3 px-4">
                        <div class="flex items-center">
                            <i class="fas fa-robot text-gray-400 mr-2"></i>
                            <span class="font-medium text-gray-900">${platform.displayName}</span>
                            ${platform.isOverDependent ? '<span class="ml-2 px-2 py-0.5 bg-red-100 text-red-700 text-xs rounded">过度依赖</span>' : ''}
                        </div>
                    </td>
                    <td class="py-3 px-4 text-center font-medium">${platform.citationCount}</td>
                    <td class="py-3 px-4 text-center">
                        <div class="flex items-center justify-center">
                            <div class="w-24 bg-gray-200 rounded-full h-2 mr-2">
                                <div class="h-2 rounded-full ${platform.isOverDependent ? 'bg-red-500' : 'bg-blue-500'}" 
                                     style="width: ${(platform.exposureRate * 100).toFixed(0)}%"></div>
                            </div>
                            <span class="text-sm">${(platform.exposureRate * 100).toFixed(0)}%</span>
                        </div>
                    </td>
                    <td class="py-3 px-4 text-center">
                        <span class="px-2 py-1 rounded text-sm ${getHealthClass(platform.healthScore)}">
                            ${platform.healthScore.toFixed(0)}
                        </span>
                    </td>
                    <td class="py-3 px-4 text-center">
                        <span class="text-sm text-gray-600">${getStageLabel(platform.lifecycleStage)}</span>
                    </td>
                    <td class="py-3 px-4 text-center">
                        <span class="px-2 py-1 rounded text-sm ${getRiskClass(platform.riskLevel)}">
                            ${getRiskLabel(platform.riskLevel)}
                        </span>
                    </td>
                    <td class="py-3 px-4 text-center">
                        <i class="fas ${getTrendIcon(platform.trendDirection)} ${getTrendIconClass(platform.trendDirection)}"></i>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function renderStrategies(strategies) {
            const container = document.getElementById('strategiesContainer');
            container.innerHTML = '';

            (strategies || []).forEach(strategy => {
                const typeClass = {
                    'reduce_dependency': 'bg-red-100 text-red-700',
                    'increase_exposure': 'bg-green-100 text-green-700',
                    'multi_channel': 'bg-purple-100 text-purple-700',
                    'official_site': 'bg-blue-100 text-blue-700'
                }[strategy.type] || 'bg-gray-100 text-gray-700';

                const typeLabel = {
                    'reduce_dependency': '降低依赖',
                    'increase_exposure': '增加曝光',
                    'multi_channel': '多渠道',
                    'official_site': '官网强化'
                }[strategy.type] || strategy.type;

                container.innerHTML += `
                    <div class="border border-gray-200 rounded-lg p-4">
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center">
                                    <span class="px-2 py-1 rounded text-xs font-medium mr-2 ${typeClass}">${typeLabel}</span>
                                    <span class="px-2 py-1 bg-gray-100 text-gray-600 rounded text-xs">优先级: ${strategy.priority}</span>
                                    <span class="px-2 py-1 rounded text-xs ml-2 ${getEffortClass(strategy.effort)}">${getEffortLabel(strategy.effort)}</span>
                                </div>
                                <h4 class="font-medium text-gray-900 mt-2">${strategy.title}</h4>
                                <p class="text-sm text-gray-600 mt-1">${strategy.description}</p>
                                <div class="mt-3">
                                    <ul class="space-y-1">
                                        ${(strategy.actionSteps || []).map(step => 
                                            `<li class="text-sm text-gray-600 flex items-start">
                                                <i class="fas fa-check text-green-500 mr-2 mt-1"></i>${step}
                                            </li>`
                                        ).join('')}
                                    </ul>
                                </div>
                                <div class="flex items-center mt-3 text-sm text-gray-500">
                                    <span class="mr-4"><i class="fas fa-calendar mr-1"></i>${strategy.suggestedTimeline}</span>
                                    <span><i class="fas fa-bullseye mr-1"></i>${strategy.expectedOutcome}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function getLevelLabel(level) {
            const labels = { 'balanced': '均衡', 'moderate': '中等', 'concentrated': '集中', 'critical': '严重' };
            return labels[level] || level;
        }

        function getLevelClass(level) {
            const classes = {
                'balanced': 'bg-green-100 text-green-700',
                'moderate': 'bg-yellow-100 text-yellow-700',
                'concentrated': 'bg-orange-100 text-orange-700',
                'critical': 'bg-red-100 text-red-700'
            };
            return classes[level] || 'bg-gray-100 text-gray-700';
        }

        function getTrendLabel(direction) {
            const labels = { 'improving': '改善中', 'stable': '稳定', 'declining': '下降中' };
            return labels[direction] || direction;
        }

        function getTrendClass(direction) {
            const classes = {
                'improving': 'bg-green-100 text-green-700',
                'stable': 'bg-gray-100 text-gray-700',
                'declining': 'bg-red-100 text-red-700'
            };
            return classes[direction] || 'bg-gray-100 text-gray-700';
        }

        function getHealthClass(score) {
            if (score >= 80) return 'bg-green-100 text-green-700';
            if (score >= 60) return 'bg-yellow-100 text-yellow-700';
            return 'bg-red-100 text-red-700';
        }

        function getStageLabel(stage) {
            const labels = { 'early': '早期', 'growth': '成长期', 'mature': '成熟期', 'decline': '衰退期' };
            return labels[stage] || stage;
        }

        function getRiskLabel(level) {
            const labels = { 'low': '低', 'medium': '中', 'high': '高' };
            return labels[level] || level;
        }

        function getRiskClass(level) {
            const classes = { 'low': 'bg-green-100 text-green-700', 'medium': 'bg-yellow-100 text-yellow-700', 'high': 'bg-red-100 text-red-700' };
            return classes[level] || 'bg-gray-100 text-gray-700';
        }

        function getTrendIcon(direction) {
            const icons = { 'rising': 'fa-arrow-up', 'stable': 'fa-minus', 'declining': 'fa-arrow-down' };
            return icons[direction] || 'fa-minus';
        }

        function getTrendIconClass(direction) {
            const classes = { 'rising': 'text-green-500', 'stable': 'text-gray-400', 'declining': 'text-red-500' };
            return classes[direction] || 'text-gray-400';
        }

        function getEffortClass(effort) {
            const classes = { 'low': 'bg-green-100 text-green-700', 'medium': 'bg-yellow-100 text-yellow-700', 'high': 'bg-red-100 text-red-700' };
            return classes[effort] || 'bg-gray-100 text-gray-700';
        }

        function getEffortLabel(effort) {
            const labels = { 'low': '简单', 'medium': '中等', 'high': '复杂' };
            return labels[effort] || effort;
        }
    </script>
</body>
</html>
