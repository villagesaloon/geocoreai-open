<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - GEO AI Trust System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background: #f3f4f6; }

<body class="bg-gray-50 min-h-screen">

    <!-- 主内容区 -->

                <!-- 筛选器（v1.3 风格增强版） -->

                            <option value="consider">🤔 考虑</option>

                        </select>
                        <select id="filterIntent" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500">
                            <option value="">所有意图</option>
                            <option value="recommend">推荐类</option>
                            <option value="compare">对比类</option>

                <!-- 问题列表表格（v1.3 增强版） -->

                                    <input type="checkbox" id="selectAll" class="rounded text-indigo-600">

                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-20">意图</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-28">蒸馏路径</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-20">质量分</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-20">状态</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase w-16">操作</th>

                    <div class="flex items-center gap-2">

    <!-- 问题详情模态框 -->
    <div id="questionModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h3 class="text-lg font-semibold text-gray-900">问题详情</h3>
                <button onclick="closeQuestionModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="questionModalContent" class="p-6 overflow-y-auto max-h-[calc(90vh-120px)]">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <script>
        // 模型颜色映射
        const modelColors = {
            'gpt4o': { bg: 'bg-green-100', text: 'text-green-700', name: 'GPT-4o' },
            'claude': { bg: 'bg-orange-100', text: 'text-orange-700', name: 'Claude 3.5' },
            'deepseek': { bg: 'bg-blue-100', text: 'text-blue-700', name: 'DeepSeek' },
            'gemini': { bg: 'bg-purple-100', text: 'text-purple-700', name: 'Gemini 2.0' },
            'perplexity': { bg: 'bg-cyan-100', text: 'text-cyan-700', name: 'Perplexity' },
            'copilot': { bg: 'bg-rose-100', text: 'text-rose-700', name: 'Copilot' }
        };

        // 蒸馏层级颜色
        const layerColors = {
            'L1': 'bg-purple-100 text-purple-700',
            'L2': 'bg-blue-100 text-blue-700',
            'L3': 'bg-cyan-100 text-cyan-700',
            'L4': 'bg-green-100 text-green-700',
            'L5': 'bg-rose-100 text-rose-700'
        };

        // 国家旗帜映射
        function getCountryFlag(code) {
            const flags = {
                'CN': '🇨🇳 中国', 'US': '🇺🇸 美国', 'GB': '🇬🇧 英国', 'JP': '🇯🇵 日本',
                'KR': '🇰🇷 韩国', 'DE': '🇩🇪 德国', 'FR': '🇫🇷 法国', 'TW': '🇹🇼 台湾',
                'HK': '🇭🇰 香港', 'SG': '🇸🇬 新加坡', 'AU': '🇦🇺 澳大利亚', 'CA': '🇨🇦 加拿大',
                'ES': '🇪🇸 西班牙', 'IT': '🇮🇹 意大利', 'BR': '🇧🇷 巴西', 'MX': '🇲🇽 墨西哥'
            };
            return flags[code] || code;
        }

        let currentProject = null;
        let currentPage = 1;
        const pageSize = 20;
        let filteredQuestions = [];
        let allQuestions = [];  // 从数据库加载的问题

        // 加载项目（从后端 API）
        async function loadProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            const action = urlParams.get('action');

            if (!projectId) {
                alert('缺少项目 ID');
                window.location.href = 'projects.html';
                return;
            }

            try {
                // 获取用户 ID（从 Firebase 认证）
                const user = JSON.parse(localStorage.getItem('user') || 'null');
                const userId = user?.dbId;
                
                if (!userId) {
                    console.error('❌ 用户未登录');
                    window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
                    return;
                }
                
                // 从后端 API 获取项目详情
                const response = await fetch(`/api/project/${projectId}`, {
                    headers: {
                        'X-User-Id': userId
                    }
                });
                const data = await response.json();
                
                if (data.success && data.data) {
                    currentProject = data.data;
                    console.log('✅ 从数据库加载项目:', currentProject.brandName);
                } else {
                    console.error('❌ 加载项目失败:', data.message);
                    alert('项目不存在或加载失败');
                    window.location.href = 'projects.html';
                    return;
                }
            } catch (error) {
                console.error('❌ API 调用失败:', error);
                alert('加载项目失败: ' + error.message);
                window.location.href = 'projects.html';
                return;
            }

            // 设置当前项目到 localStorage，以便导航组件识别
            localStorage.setItem('geo_current_project', JSON.stringify(currentProject));
            
            // 重新渲染导航以显示项目级菜单
            if (typeof GCoreNav !== 'undefined') {
                GCoreNav.renderNav('sidebar');
            }

            // 先加载问题数据，再更新页面信息（统计需要问题数据）
            await loadQuestionsFromApi();
            updateProjectInfo();
            populateFilters();

            // 如果有 action=detect，自动开始检测
            if (action === 'detect') {
                setTimeout(() => startSheepAnalysis(), 500);
            }
        }

        // 更新项目信息（适配后端 API 数据结构）
        function updateProjectInfo() {
            const p = currentProject;
            
            // 顶部 - 兼容新旧数据结构
            const projectName = p.brandName || p.project?.name || '项目详情';
            const monitorUrl = p.monitorUrl || p.project?.monitorUrl || '';
            document.getElementById('headerProjectName').textContent = projectName;
            document.getElementById('headerProjectUrl').textContent = monitorUrl;
            
            // 状态
            const statusMap = {
                'draft': { label: '草稿', class: 'bg-gray-100 text-gray-600' },
                'pending': { label: '待检测', class: 'bg-amber-100 text-amber-700' },
                'active': { label: '活跃', class: 'bg-green-100 text-green-700' },
                'detecting': { label: '检测中', class: 'bg-blue-100 text-blue-700' },
                'completed': { label: '已完成', class: 'bg-green-100 text-green-700' }
            };
            const status = statusMap[p.status] || statusMap.pending;
            document.getElementById('projectStatus').textContent = status.label;
            document.getElementById('projectStatus').className = `px-3 py-1 rounded-full text-sm font-medium ${status.class}`;

            // 统计 - 使用 allQuestions（从 API 加载）
            const models = p.config?.models || p.project?.models || [];
            // 已测试 = 有回答的问题数量
            const tested = allQuestions.filter(q => q.answers && q.answers.length > 0).length;
            
            document.getElementById('totalQuestions').textContent = allQuestions.length;
            document.getElementById('totalModels').textContent = models.length;
            document.getElementById('testedQuestions').textContent = tested;
            
            // 计算 AI 可见度（行业标准 GEO 指标）
            const questionsWithAnswers = allQuestions.filter(q => q.answers && q.answers.length > 0);
            let visibilityText = '--%';
            if (questionsWithAnswers.length > 0 && p.brandName) {
                const brandName = p.brandName.toLowerCase();
                let brandMentionCount = 0;
                
                questionsWithAnswers.forEach(q => {
                    const answer = q.answers[0];
                    if (answer) {
                        const answerText = (answer.answer || '').toLowerCase();
                        if (answerText.includes(brandName)) {
                            brandMentionCount++;
                        }
                    }
                });
                
                // AI 可见度 = 品牌被提及的回答数 / 总回答数 * 100
                const visibility = Math.round(brandMentionCount / questionsWithAnswers.length * 100);
                visibilityText = visibility + '%';
            }
            document.getElementById('avgVisibility').textContent = visibilityText;

            // 品牌信息
            document.getElementById('brandNameDisplay').textContent = p.brandName || '--';
            document.getElementById('productNameDisplay').textContent = p.productName || p.description || '--';
            const monitorUrlEl = document.getElementById('monitorUrlDisplay');
            if (monitorUrl) {
                monitorUrlEl.textContent = monitorUrl;
                monitorUrlEl.href = monitorUrl.startsWith('http') ? monitorUrl : `https://${monitorUrl}`;
            } else {
                monitorUrlEl.textContent = '--';
                monitorUrlEl.href = '#';
            }

            // 竞品列表
            const competitorsList = document.getElementById('competitorsList');
            const competitors = p.competitors || [];
            if (competitors.length > 0) {
                competitorsList.innerHTML = competitors.map(c => {
                    const name = typeof c === 'string' ? c : (c.name || c.brandName || '');
                    return `<span class="px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs">${name}</span>`;
                }).join('');
            } else {
                competitorsList.innerHTML = '<span class="text-sm text-gray-400">未设置竞品</span>';
            }

                    if (!groupedSP[country]) groupedSP[country] = [];

                const groupedPersonas = {};
                personas.forEach(a => {

                    if (!groupedPersonas[country]) groupedPersonas[country] = [];

        // 从后端 API 加载问题列表
        async function loadQuestionsFromApi() {
            const projectId = currentProject?.id;
            if (!projectId) {
                allQuestions = [];
                filteredQuestions = [];
                renderQuestions();
                return;
            }

            try {
                // 获取用户 ID（从 Firebase 认证）
                const user = JSON.parse(localStorage.getItem('user') || 'null');
                const userId = user?.dbId;
                
                if (!userId) {
                    console.error('❌ 用户未登录，无法加载问题');
                    return;
                }
                
                console.log('📡 加载问题 API: projectId=', projectId, ', userId=', userId);
                const response = await fetch(`/api/project/${projectId}/questions`, {
                    headers: {
                        'X-User-Id': userId
                    }
                });
                const data = await response.json();
                
                if (data.success && data.data) {
                    allQuestions = data.data;
                    console.log('✅ 从数据库加载问题:', allQuestions.length, '个');
                } else {
                    console.warn('⚠️ 加载问题失败或无问题:', data.message);
                    allQuestions = [];
                }
            } catch (error) {
                console.error('❌ 加载问题 API 调用失败:', error);
                allQuestions = [];
            }

            filteredQuestions = filterQuestions(allQuestions);
            renderQuestions();
            
            // 更新统计信息
            updateProjectInfo();
        }

        // 加载问题列表（本地筛选）
        function loadQuestions() {
            filteredQuestions = filterQuestions(allQuestions);
            renderQuestions();
        }

        // 筛选问题（适配后端 API 数据结构）
        function filterQuestions(questions) {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const persona = document.getElementById('filterPersona').value;
            const stage = document.getElementById('filterStage').value;
            const intent = document.getElementById('filterIntent').value;
            const qualityFilter = document.getElementById('filterQuality').value;
            const status = document.getElementById('filterStatus').value;

            return questions.filter(q => {
                // 搜索 - 兼容后端 Question 字段
                const questionText = q.question || '';
                if (search && !questionText.toLowerCase().includes(search)) return false;
                
                // 画像筛选 - 后端返回字符串
                if (persona && q.persona !== persona) return false;
                
                // 阶段筛选 - 后端返回字符串
                if (stage && q.stage !== stage) return false;
                
                // 意图筛选
                if (intent && q.intent !== intent) return false;
                
                // 质量分筛选 - 从 Answers 数组获取 searchIndex 和 brandFitIndex
                if (qualityFilter) {
                    const firstAnswer = q.answers?.[0];
                    const searchIdx = firstAnswer?.searchIndex || 0;
                    const brandIdx = firstAnswer?.brandFitIndex || 0;
                    const quality = searchIdx && brandIdx ? Math.round(searchIdx * brandIdx / 100) : 75;
                    if (qualityFilter === '90' && quality < 90) return false;
                    if (qualityFilter === '80' && quality < 80) return false;
                    if (qualityFilter === '70' && quality < 70) return false;
                    if (qualityFilter === '0' && quality >= 70) return false;
                }
                
                // 状态筛选 - 检查是否有回答
                const hasTested = q.answers && q.answers.length > 0;
                if (status === 'tested' && !hasTested) return false;
                if (status === 'pending' && hasTested) return false;
                
                return true;
            });
        }

        const intentMap = {
            'recommend': { label: '推荐', class: 'bg-blue-100 text-blue-700' },
            'compare': { label: '对比', class: 'bg-purple-100 text-purple-700' },
            'review': { label: '评测', class: 'bg-cyan-100 text-cyan-700' },
            'problem': { label: '问题', class: 'bg-amber-100 text-amber-700' },
            'purchase': { label: '购买', class: 'bg-green-100 text-green-700' }
        };

                            projectId: projId
                        })
                    });
                    
                    console.log('📡 createResponse status:', createResponse.status);
                    if (!createResponse.ok) {
                        const errorText = await createResponse.text();
                        console.error('❌ HTTP 错误:', createResponse.status, errorText);
                        throw new Error(`HTTP ${createResponse.status}: ${errorText}`);
                    }
                    
                    const createData = await createResponse.json();
                    console.log('📦 createData:', JSON.stringify(createData));
                    if (!createData.success || !createData.taskId) {
                        throw new Error(createData.message || '任务创建失败');
                    }
                    
                    const taskId = createData.taskId;
                    console.log('✅ 任务已创建, taskId:', taskId);
                    
                    // Step 2: 轮询任务状态（借鉴 setup-wizard.html）
                    const maxPolls = 200;
                    let pollCount = 0;
                    
                    while (pollCount < maxPolls) {
                        await new Promise(resolve => setTimeout(resolve, 3000));
                        pollCount++;
                        
                        let statusData;
                        try {
                            const statusResponse = await fetch(`/api/distillation/questions/status/${taskId}`);
                            if (!statusResponse.ok) {
                                if (statusResponse.status === 404) {
                                    throw new Error('任务已丢失（后端可能已重启），请刷新页面后重新生成');
                                }
                                console.warn(`⚠️ [${pollCount}] 轮询 HTTP ${statusResponse.status}，继续重试...`);
                                continue;
                            }
                            const contentType = statusResponse.headers.get('content-type') || '';
                            if (!contentType.includes('application/json')) {
                                console.warn(`⚠️ [${pollCount}] 轮询返回非 JSON (${contentType})，继续重试...`);
                                continue;
                            }
                            statusData = await statusResponse.json();
                        } catch (pollErr) {
                            console.warn(`⚠️ [${pollCount}] 轮询请求异常: ${pollErr.message}，继续重试...`);
                            continue;
                        }
                        
                        if (!statusData.success) {
                            console.error('❌ 查询状态失败:', statusData.message);
                            continue;
                        }
                        
                        // 更新进度显示
                        const progress = statusData.progress || 0;
                        const message = statusData.message || '处理中...';
                        btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i>${progress}% - ${message}`;
                        
                        // 检查是否完成
                        if (statusData.status === 'completed') {
                            console.log('🎉 任务完成！');
                            break;
                        }
                        
                        if (statusData.status === 'failed') {
                            throw new Error(statusData.message || '任务执行失败');
                        }
                    }
                    
                    // 刷新问题列表（从 API 重新加载）
                    await loadQuestionsFromApi();
                    
                } catch (error) {
                    console.error('生成问题失败:', error);

                    }
                    
                    // 显示核心需求
                    if (audience.needs && audience.needs.length > 0) {
                        html += `<p><strong>核心需求 (${audience.needs.length})：</strong></p><ul style="margin:10px 0;">`;
                        audience.needs.forEach((n, i) => {
                            html += `<li style="margin-bottom:6px;">${i+1}. ${n}</li>`;
                        });
                        html += '</ul>';
                    }
                    
                    // 如果都为空，显示原始数据
                    if ((!audience.userTypes || audience.userTypes.length === 0) && 
                        (!audience.roles || audience.roles.length === 0) && 
                        (!audience.needs || audience.needs.length === 0)) {
                        html += `<p>原始数据：</p><pre style="font-size:12px;background:#f5f5f5;padding:10px;border-radius:4px;overflow:auto;">${JSON.stringify(audience, null, 2)}</pre>`;
                    }
                    
                    html += '</div>';
                    
                    const modal = document.createElement('div');
                    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;';
                    modal.innerHTML = `
                        <div style="background:white;padding:24px;border-radius:12px;max-width:600px;width:90%;">
                            <h3 style="margin-bottom:16px;font-size:18px;font-weight:bold;">✅ 目标受众生成成功</h3>
                            ${html}
                            <button onclick="this.closest('div').parentElement.remove()" style="margin-top:16px;padding:8px 24px;background:#6366f1;color:white;border:none;border-radius:6px;cursor:pointer;">关闭</button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                } else {
                    alert('生成失败: ' + (data.message || '未知错误'));
                }
            } catch (error) {
                console.error('❌ [测试受众] 错误:', error);
                alert('请求失败: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // 初始化
        loadProject();
    </script>
</body>
</html>
