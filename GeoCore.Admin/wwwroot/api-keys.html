<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 密钥 - GCore Admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background: #f3f4f6; }
        .sidebar-link.active { background: #eef2ff; color: #6366f1; border-right: 3px solid #6366f1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-60 bg-white border-r border-gray-200 z-50"></aside>
    <script src="js/navigation.js"></script>

    <main class="ml-60">
        <!-- 顶部导航 -->
        <header class="sticky top-0 bg-white border-b border-gray-200 px-8 py-4 z-40">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">API 密钥管理</h2>
                    <p class="text-sm text-gray-500">管理第三方服务 API 密钥</p>
                </div>
            </div>
        </header>

        <div class="p-8">
            <div class="max-w-3xl space-y-6">
                <!-- Firebase 配置 -->
                <div class="bg-white rounded-xl shadow-sm">
                    <div class="p-6 border-b border-gray-200">
                        <div class="flex items-center gap-3">
                            <span class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center">
                                <i class="fas fa-fire text-amber-600"></i>
                            </span>
                            <div>
                                <h3 class="text-lg font-semibold text-gray-900">Firebase</h3>
                                <p class="text-sm text-gray-500">Google 登录认证</p>
                            </div>
                        </div>
                    </div>
                    <div class="p-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Project ID</label>
                            <input type="text" value="geocoreai" disabled
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 font-mono text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Auth Domain</label>
                            <input type="text" value="geocoreai.firebaseapp.com" disabled
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 font-mono text-sm">
                        </div>
                        <div class="flex items-center gap-2 text-emerald-600 text-sm">
                            <i class="fas fa-check-circle"></i>
                            <span>已配置</span>
                        </div>
                    </div>
                </div>

                <!-- OpenAI 配置 -->
                <div class="bg-white rounded-xl shadow-sm">
                    <div class="p-6 border-b border-gray-200">
                        <div class="flex items-center gap-3">
                            <span class="w-10 h-10 bg-emerald-100 rounded-lg flex items-center justify-center">
                                <i class="fas fa-robot text-emerald-600"></i>
                            </span>
                            <div>
                                <h3 class="text-lg font-semibold text-gray-900">OpenAI</h3>
                                <p class="text-sm text-gray-500">AI 模型调用</p>
                            </div>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex items-center gap-2 text-gray-400 text-sm">
                            <i class="fas fa-clock"></i>
                            <span>待配置</span>
                        </div>
                    </div>
                </div>

                <!-- 数据库配置 -->
                <div class="bg-white rounded-xl shadow-sm">
                    <div class="p-6 border-b border-gray-200">
                        <div class="flex items-center gap-3">
                            <span class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                                <i class="fas fa-database text-blue-600"></i>
                            </span>
                            <div>
                                <h3 class="text-lg font-semibold text-gray-900">MySQL 数据库</h3>
                                <p class="text-sm text-gray-500">数据存储</p>
                            </div>
                        </div>
                    </div>
                    <div class="p-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Host</label>
                            <input type="text" value="101.37.86.154:20696" disabled
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 font-mono text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Database</label>
                            <input type="text" value="GeocoreAI" disabled
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 font-mono text-sm">
                        </div>
                        <div class="flex items-center gap-2 text-emerald-600 text-sm">
                            <i class="fas fa-check-circle"></i>
                            <span>已连接</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
