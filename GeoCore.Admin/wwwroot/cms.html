<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理 - GCore Admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background: #f3f4f6; }
        .sidebar-link.active { background: #eef2ff; color: #6366f1; border-right: 3px solid #6366f1; }
        .tab-btn.active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        .modal { display: none; }
        .modal.show { display: flex; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-60 bg-white border-r border-gray-200 z-50"></aside>
    <script src="js/navigation.js"></script>

    <main class="ml-60">
        <header class="sticky top-0 bg-white border-b border-gray-200 px-8 py-4 z-40">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">内容管理 (CMS)</h2>
                    <p class="text-sm text-gray-500">管理博客、文档、FAQ 等内容</p>
                </div>
                <button onclick="showArticleModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                    <i class="fas fa-plus mr-2"></i>新建文章
                </button>
            </div>
        </header>

        <!-- Tab 导航 -->
        <div class="bg-white border-b border-gray-200 px-8">
            <div class="flex space-x-8">
                <button class="tab-btn active py-4 px-2 text-sm font-medium" data-tab="articles" data-type="">
                    <i class="fas fa-file-alt mr-2"></i>全部文章
                </button>
                <button class="tab-btn py-4 px-2 text-sm font-medium text-gray-500" data-tab="articles" data-type="blog">
                    <i class="fas fa-blog mr-2"></i>博客
                </button>
                <button class="tab-btn py-4 px-2 text-sm font-medium text-gray-500" data-tab="articles" data-type="doc">
                    <i class="fas fa-book mr-2"></i>文档
                </button>
                <button class="tab-btn py-4 px-2 text-sm font-medium text-gray-500" data-tab="articles" data-type="faq">
                    <i class="fas fa-question-circle mr-2"></i>FAQ
                </button>
                <button class="tab-btn py-4 px-2 text-sm font-medium text-gray-500" data-tab="categories">
                    <i class="fas fa-folder mr-2"></i>分类管理
                </button>
            </div>
        </div>

        <div class="p-8">
            <!-- 文章列表 -->
            <div id="tab-articles">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center space-x-4">
                        <select id="publishFilter" class="border rounded-lg px-3 py-2" onchange="loadArticles()">
                            <option value="">全部状态</option>
                            <option value="true">已发布</option>
                            <option value="false">草稿</option>
                        </select>
                    </div>
                    <span id="articleCount" class="text-sm text-gray-500"></span>
                </div>
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">标题</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">类型</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">分类</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">阅读量</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">更新时间</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody id="articlesTable" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>

            <!-- 分类管理 -->
            <div id="tab-categories" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <select id="categoryTypeFilter" class="border rounded-lg px-3 py-2" onchange="loadCategories()">
                        <option value="">全部类型</option>
                        <option value="blog">博客</option>
                        <option value="doc">文档</option>
                        <option value="faq">FAQ</option>
                    </select>
                    <button onclick="showCategoryModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                        <i class="fas fa-plus mr-2"></i>新建分类
                    </button>
                </div>
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">名称</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">类型</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Slug</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">图标</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">排序</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTable" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- 文章编辑模态框 -->
    <div id="articleModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
        <div class="bg-white rounded-xl w-[900px] max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b">
                <h3 id="articleModalTitle" class="text-lg font-semibold">新建文章</h3>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">文章类型</label>
                        <select id="articleType" class="w-full border rounded-lg px-3 py-2">
                            <option value="blog">博客</option>
                            <option value="doc">文档</option>
                            <option value="faq">FAQ</option>
                            <option value="case">案例</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
                        <select id="articleCategory" class="w-full border rounded-lg px-3 py-2">
                            <option value="">无分类</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">标题 *</label>
                    <input type="text" id="articleTitle" class="w-full border rounded-lg px-3 py-2" placeholder="输入文章标题">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">URL Slug</label>
                    <input type="text" id="articleSlug" class="w-full border rounded-lg px-3 py-2" placeholder="自动生成，可手动修改">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">摘要</label>
                    <textarea id="articleSummary" rows="2" class="w-full border rounded-lg px-3 py-2" placeholder="文章摘要，用于列表展示"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">正文内容 (Markdown)</label>
                    <textarea id="articleContent" rows="12" class="w-full border rounded-lg px-3 py-2 font-mono text-sm" placeholder="支持 Markdown 格式"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">封面图片 URL</label>
                        <input type="text" id="articleCover" class="w-full border rounded-lg px-3 py-2" placeholder="https://...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">作者</label>
                        <input type="text" id="articleAuthor" class="w-full border rounded-lg px-3 py-2" placeholder="作者名称">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">标签 (逗号分隔)</label>
                    <input type="text" id="articleTags" class="w-full border rounded-lg px-3 py-2" placeholder="geo, seo, ai">
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">排序</label>
                        <input type="number" id="articleSort" class="w-full border rounded-lg px-3 py-2" value="0">
                    </div>
                    <div class="flex items-center pt-6">
                        <input type="checkbox" id="articleFeatured" class="mr-2">
                        <label class="text-sm text-gray-700">置顶</label>
                    </div>
                    <div class="flex items-center pt-6">
                        <input type="checkbox" id="articlePublished" class="mr-2">
                        <label class="text-sm text-gray-700">立即发布</label>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t flex justify-end space-x-3">
                <button onclick="hideArticleModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">取消</button>
                <button onclick="saveArticle()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">保存</button>
            </div>
        </div>
    </div>

    <!-- 分类编辑模态框 -->
    <div id="categoryModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
        <div class="bg-white rounded-xl w-[500px]">
            <div class="p-6 border-b">
                <h3 id="categoryModalTitle" class="text-lg font-semibold">新建分类</h3>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">文章类型</label>
                    <select id="categoryType" class="w-full border rounded-lg px-3 py-2">
                        <option value="blog">博客</option>
                        <option value="doc">文档</option>
                        <option value="faq">FAQ</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">分类名称 *</label>
                    <input type="text" id="categoryName" class="w-full border rounded-lg px-3 py-2" placeholder="如：快速入门">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
                    <input type="text" id="categorySlug" class="w-full border rounded-lg px-3 py-2" placeholder="如：getting-started">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                    <textarea id="categoryDesc" rows="2" class="w-full border rounded-lg px-3 py-2"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">图标 (FontAwesome)</label>
                        <input type="text" id="categoryIcon" class="w-full border rounded-lg px-3 py-2" placeholder="fas fa-rocket">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">排序</label>
                        <input type="number" id="categorySort" class="w-full border rounded-lg px-3 py-2" value="0">
                    </div>
                </div>
            </div>
            <div class="p-6 border-t flex justify-end space-x-3">
                <button onclick="hideCategoryModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">取消</button>
                <button onclick="saveCategory()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/admin/cms';
        let currentArticleType = '';
        let editingArticleId = null;
        let editingCategoryId = null;

        // Tab 切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const tab = btn.dataset.tab;
                if (tab === 'articles') {
                    currentArticleType = btn.dataset.type || '';
                    document.getElementById('tab-articles').classList.remove('hidden');
                    document.getElementById('tab-categories').classList.add('hidden');
                    loadArticles();
                } else {
                    document.getElementById('tab-articles').classList.add('hidden');
                    document.getElementById('tab-categories').classList.remove('hidden');
                    loadCategories();
                }
            });
        });

        // 加载文章
        async function loadArticles() {
            const published = document.getElementById('publishFilter').value;
            let url = `${API_BASE}/articles?`;
            if (currentArticleType) url += `type=${currentArticleType}&`;
            if (published) url += `published=${published}`;
            
            const res = await fetch(url);
            const articles = await res.json();
            
            document.getElementById('articleCount').textContent = `共 ${articles.length} 篇文章`;
            
            const typeLabels = { blog: '博客', doc: '文档', faq: 'FAQ', case: '案例' };
            document.getElementById('articlesTable').innerHTML = articles.map(a => `
                <tr>
                    <td class="px-4 py-3">
                        <div class="font-medium text-gray-900">${a.title}</div>
                        <div class="text-xs text-gray-500">${a.slug}</div>
                    </td>
                    <td class="px-4 py-3"><span class="px-2 py-1 bg-gray-100 rounded text-xs">${typeLabels[a.articleType] || a.articleType}</span></td>
                    <td class="px-4 py-3 text-sm text-gray-500">${a.category || '-'}</td>
                    <td class="px-4 py-3">
                        ${a.isPublished 
                            ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">已发布</span>' 
                            : '<span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs">草稿</span>'}
                        ${a.isFeatured ? '<span class="ml-1 px-2 py-1 bg-indigo-100 text-indigo-700 rounded text-xs">置顶</span>' : ''}
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-500">${a.viewCount}</td>
                    <td class="px-4 py-3 text-sm text-gray-500">${new Date(a.updatedAt).toLocaleDateString()}</td>
                    <td class="px-4 py-3">
                        <button onclick="editArticle(${a.id})" class="text-indigo-600 hover:text-indigo-800 mr-2"><i class="fas fa-edit"></i></button>
                        ${a.isPublished 
                            ? `<button onclick="unpublishArticle(${a.id})" class="text-yellow-600 hover:text-yellow-800 mr-2" title="取消发布"><i class="fas fa-eye-slash"></i></button>`
                            : `<button onclick="publishArticle(${a.id})" class="text-green-600 hover:text-green-800 mr-2" title="发布"><i class="fas fa-eye"></i></button>`}
                        <button onclick="deleteArticle(${a.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // 加载分类
        async function loadCategories() {
            const type = document.getElementById('categoryTypeFilter').value;
            const url = type ? `${API_BASE}/categories?type=${type}` : `${API_BASE}/categories`;
            const res = await fetch(url);
            const categories = await res.json();
            
            const typeLabels = { blog: '博客', doc: '文档', faq: 'FAQ' };
            document.getElementById('categoriesTable').innerHTML = categories.map(c => `
                <tr>
                    <td class="px-4 py-3 font-medium text-gray-900">${c.name}</td>
                    <td class="px-4 py-3"><span class="px-2 py-1 bg-gray-100 rounded text-xs">${typeLabels[c.articleType] || c.articleType}</span></td>
                    <td class="px-4 py-3 text-sm text-gray-500">${c.slug}</td>
                    <td class="px-4 py-3">${c.icon ? `<i class="${c.icon}"></i>` : '-'}</td>
                    <td class="px-4 py-3 text-sm text-gray-500">${c.sortOrder}</td>
                    <td class="px-4 py-3">
                        <button onclick="editCategory(${c.id})" class="text-indigo-600 hover:text-indigo-800 mr-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteCategory(${c.id})" class="text-red-600 hover:text-red-800"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // 文章模态框
        function showArticleModal() {
            editingArticleId = null;
            document.getElementById('articleModalTitle').textContent = '新建文章';
            document.getElementById('articleType').value = currentArticleType || 'blog';
            document.getElementById('articleCategory').value = '';
            document.getElementById('articleTitle').value = '';
            document.getElementById('articleSlug').value = '';
            document.getElementById('articleSummary').value = '';
            document.getElementById('articleContent').value = '';
            document.getElementById('articleCover').value = '';
            document.getElementById('articleAuthor').value = '';
            document.getElementById('articleTags').value = '';
            document.getElementById('articleSort').value = '0';
            document.getElementById('articleFeatured').checked = false;
            document.getElementById('articlePublished').checked = false;
            loadCategoryOptions();
            document.getElementById('articleModal').classList.add('show');
        }

        function hideArticleModal() {
            document.getElementById('articleModal').classList.remove('show');
        }

        async function loadCategoryOptions() {
            const res = await fetch(`${API_BASE}/categories`);
            const categories = await res.json();
            const select = document.getElementById('articleCategory');
            select.innerHTML = '<option value="">无分类</option>' + 
                categories.map(c => `<option value="${c.slug}">${c.name} (${c.articleType})</option>`).join('');
        }

        async function editArticle(id) {
            const res = await fetch(`${API_BASE}/articles/${id}`);
            const a = await res.json();
            
            editingArticleId = id;
            document.getElementById('articleModalTitle').textContent = '编辑文章';
            document.getElementById('articleType').value = a.articleType;
            document.getElementById('articleTitle').value = a.title;
            document.getElementById('articleSlug').value = a.slug;
            document.getElementById('articleSummary').value = a.summary || '';
            document.getElementById('articleContent').value = a.content;
            document.getElementById('articleCover').value = a.coverImage || '';
            document.getElementById('articleAuthor').value = a.author || '';
            document.getElementById('articleTags').value = a.tags ? JSON.parse(a.tags).join(', ') : '';
            document.getElementById('articleSort').value = a.sortOrder;
            document.getElementById('articleFeatured').checked = a.isFeatured;
            document.getElementById('articlePublished').checked = a.isPublished;
            
            await loadCategoryOptions();
            document.getElementById('articleCategory').value = a.category || '';
            document.getElementById('articleModal').classList.add('show');
        }

        async function saveArticle() {
            const tags = document.getElementById('articleTags').value;
            const data = {
                articleType: document.getElementById('articleType').value,
                category: document.getElementById('articleCategory').value || null,
                title: document.getElementById('articleTitle').value,
                slug: document.getElementById('articleSlug').value,
                summary: document.getElementById('articleSummary').value || null,
                content: document.getElementById('articleContent').value,
                coverImage: document.getElementById('articleCover').value || null,
                author: document.getElementById('articleAuthor').value || null,
                tags: tags ? JSON.stringify(tags.split(',').map(t => t.trim())) : null,
                sortOrder: parseInt(document.getElementById('articleSort').value) || 0,
                isFeatured: document.getElementById('articleFeatured').checked,
                isPublished: document.getElementById('articlePublished').checked
            };
            
            const url = editingArticleId ? `${API_BASE}/articles/${editingArticleId}` : `${API_BASE}/articles`;
            const method = editingArticleId ? 'PUT' : 'POST';
            
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                hideArticleModal();
                loadArticles();
            } else {
                const err = await res.json();
                alert(err.error || '保存失败');
            }
        }

        async function publishArticle(id) {
            await fetch(`${API_BASE}/articles/${id}/publish`, { method: 'POST' });
            loadArticles();
        }

        async function unpublishArticle(id) {
            await fetch(`${API_BASE}/articles/${id}/unpublish`, { method: 'POST' });
            loadArticles();
        }

        async function deleteArticle(id) {
            if (!confirm('确定删除这篇文章？')) return;
            await fetch(`${API_BASE}/articles/${id}`, { method: 'DELETE' });
            loadArticles();
        }

        // 分类模态框
        function showCategoryModal() {
            editingCategoryId = null;
            document.getElementById('categoryModalTitle').textContent = '新建分类';
            document.getElementById('categoryType').value = 'blog';
            document.getElementById('categoryName').value = '';
            document.getElementById('categorySlug').value = '';
            document.getElementById('categoryDesc').value = '';
            document.getElementById('categoryIcon').value = '';
            document.getElementById('categorySort').value = '0';
            document.getElementById('categoryModal').classList.add('show');
        }

        function hideCategoryModal() {
            document.getElementById('categoryModal').classList.remove('show');
        }

        async function editCategory(id) {
            const res = await fetch(`${API_BASE}/categories/${id}`);
            const c = await res.json();
            
            editingCategoryId = id;
            document.getElementById('categoryModalTitle').textContent = '编辑分类';
            document.getElementById('categoryType').value = c.articleType;
            document.getElementById('categoryName').value = c.name;
            document.getElementById('categorySlug').value = c.slug;
            document.getElementById('categoryDesc').value = c.description || '';
            document.getElementById('categoryIcon').value = c.icon || '';
            document.getElementById('categorySort').value = c.sortOrder;
            document.getElementById('categoryModal').classList.add('show');
        }

        async function saveCategory() {
            const data = {
                articleType: document.getElementById('categoryType').value,
                name: document.getElementById('categoryName').value,
                slug: document.getElementById('categorySlug').value,
                description: document.getElementById('categoryDesc').value || null,
                icon: document.getElementById('categoryIcon').value || null,
                sortOrder: parseInt(document.getElementById('categorySort').value) || 0,
                isActive: true
            };
            
            const url = editingCategoryId ? `${API_BASE}/categories/${editingCategoryId}` : `${API_BASE}/categories`;
            const method = editingCategoryId ? 'PUT' : 'POST';
            
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                hideCategoryModal();
                loadCategories();
            } else {
                const err = await res.json();
                alert(err.error || '保存失败');
            }
        }

        async function deleteCategory(id) {
            if (!confirm('确定删除这个分类？')) return;
            await fetch(`${API_BASE}/categories/${id}`, { method: 'DELETE' });
            loadCategories();
        }

        // 初始化
        loadArticles();
    </script>
</body>
</html>
