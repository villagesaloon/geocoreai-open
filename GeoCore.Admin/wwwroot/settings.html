<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - GCore Admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background: #f3f4f6; }
        .sidebar-link.active { background: #eef2ff; color: #6366f1; border-right: 3px solid #6366f1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-60 bg-white border-r border-gray-200 z-50"></aside>
    <script src="js/navigation.js"></script>

    <main class="ml-60">
        <!-- 顶部导航 -->
        <header class="sticky top-0 bg-white border-b border-gray-200 px-8 py-4 z-40">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">系统设置</h2>
                    <p class="text-sm text-gray-500">配置平台参数</p>
                </div>
            </div>
        </header>

        <div class="p-8">
            <div class="max-w-3xl space-y-6">
                <!-- 基本设置 -->
                <div class="bg-white rounded-xl shadow-sm">
                    <div class="p-6 border-b border-gray-200">
                        <h3 class="text-lg font-semibold text-gray-900">基本设置</h3>
                    </div>
                    <div class="p-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">平台名称</label>
                            <input type="text" value="GEOCore AI" disabled
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">平台域名</label>
                            <input type="text" value="geocoreai.com" disabled
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">
                        </div>
                    </div>
                </div>

                <!-- 服务状态 -->
                <div class="bg-white rounded-xl shadow-sm">
                    <div class="p-6 border-b border-gray-200">
                        <h3 class="text-lg font-semibold text-gray-900">服务状态</h3>
                    </div>
                    <div class="p-6">
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                <div class="flex items-center gap-3">
                                    <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                                    <span class="font-medium">SaaS 前台 (8080)</span>
                                </div>
                                <span class="text-emerald-600 text-sm">运行中</span>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                <div class="flex items-center gap-3">
                                    <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                                    <span class="font-medium">Admin 后台 (8081)</span>
                                </div>
                                <span class="text-emerald-600 text-sm">运行中</span>
                            </div>
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                <div class="flex items-center gap-3">
                                    <span id="dbStatus" class="w-3 h-3 bg-gray-300 rounded-full"></span>
                                    <span class="font-medium">MySQL 数据库</span>
                                </div>
                                <span id="dbStatusText" class="text-gray-500 text-sm">检测中...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 系统信息 -->
                <div class="bg-white rounded-xl shadow-sm">
                    <div class="p-6 border-b border-gray-200">
                        <h3 class="text-lg font-semibold text-gray-900">系统信息</h3>
                    </div>
                    <div class="p-6">
                        <dl class="space-y-3 text-sm">
                            <div class="flex justify-between">
                                <dt class="text-gray-500">运行环境</dt>
                                <dd class="text-gray-900">.NET 9.0</dd>
                            </div>
                            <div class="flex justify-between">
                                <dt class="text-gray-500">数据库</dt>
                                <dd class="text-gray-900">MySQL 8.0</dd>
                            </div>
                            <div class="flex justify-between">
                                <dt class="text-gray-500">ORM</dt>
                                <dd class="text-gray-900">SqlSugar</dd>
                            </div>
                            <div class="flex justify-between">
                                <dt class="text-gray-500">认证方式</dt>
                                <dd class="text-gray-900">Firebase (Google OAuth)</dd>
                            </div>
                        </dl>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function checkHealth() {
            try {
                const response = await fetch('/api/health');
                const result = await response.json();
                if (result.Status === 'OK') {
                    document.getElementById('dbStatus').className = 'w-3 h-3 bg-emerald-500 rounded-full';
                    document.getElementById('dbStatusText').textContent = '连接正常';
                    document.getElementById('dbStatusText').className = 'text-emerald-600 text-sm';
                }
            } catch (error) {
                document.getElementById('dbStatus').className = 'w-3 h-3 bg-red-500 rounded-full';
                document.getElementById('dbStatusText').textContent = '连接失败';
                document.getElementById('dbStatusText').className = 'text-red-600 text-sm';
            }
        }

        checkHealth();
    </script>
</body>
</html>
