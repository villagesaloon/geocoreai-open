<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员管理 - GCore Admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background: #f3f4f6; }
        .sidebar-link.active { background: #eef2ff; color: #6366f1; border-right: 3px solid #6366f1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-60 bg-white border-r border-gray-200 z-50"></aside>
    <script src="js/navigation.js"></script>

    <main class="ml-60">
        <!-- 顶部导航 -->
        <header class="sticky top-0 bg-white border-b border-gray-200 px-8 py-4 z-40">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">管理员管理</h2>
                    <p class="text-sm text-gray-500">管理后台管理员账号</p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="showAddModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                        <i class="fas fa-plus mr-2"></i>添加管理员
                    </button>
                </div>
            </div>
        </header>

        <div class="p-8">
            <!-- 管理员列表 -->
            <div class="bg-white rounded-xl shadow-sm">
                <div class="p-6 border-b border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-900">管理员列表</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">管理员</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">用户名</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">角色</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">登录次数</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">最后登录</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody" class="divide-y divide-gray-200">
                            <tr>
                                <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                    <i class="fas fa-spinner fa-spin mr-2"></i>加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- 添加管理员模态框 -->
    <div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4">
            <h3 class="text-lg font-bold text-gray-900 mb-4">添加管理员</h3>
            <form id="addForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" id="newUsername" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">显示名称</label>
                    <input type="text" id="newDisplayName" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="newPassword" required minlength="6"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">角色</label>
                    <select id="newRole" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                        <option value="operator">运营人员</option>
                        <option value="admin">管理员</option>
                        <option value="superadmin">超级管理员</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="hideAddModal()" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">取消</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">添加</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function loadAdmins() {
            try {
                const response = await fetch('/api/admin/admins');
                const result = await response.json();
                
                if (result.success) {
                    renderAdmins(result.data);
                }
            } catch (error) {
                console.error('加载管理员失败:', error);
                document.getElementById('adminTableBody').innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-red-500">
                            <i class="fas fa-exclamation-circle mr-2"></i>加载失败
                        </td>
                    </tr>
                `;
            }
        }

        function renderAdmins(admins) {
            const tbody = document.getElementById('adminTableBody');
            
            if (!admins || admins.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                            <i class="fas fa-inbox mr-2"></i>暂无管理员
                        </td>
                    </tr>
                `;
                return;
            }

            const roleLabels = {
                'superadmin': { text: '超级管理员', class: 'bg-red-100 text-red-700' },
                'admin': { text: '管理员', class: 'bg-purple-100 text-purple-700' },
                'operator': { text: '运营人员', class: 'bg-blue-100 text-blue-700' }
            };

            tbody.innerHTML = admins.map(admin => {
                const role = roleLabels[admin.role] || { text: admin.role, class: 'bg-gray-100 text-gray-700' };
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">
                                    ${(admin.displayName || admin.username).charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <p class="font-medium text-gray-900">${admin.displayName || '-'}</p>
                                    <p class="text-xs text-gray-500">${admin.email || '-'}</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-gray-600">${admin.username}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 text-xs rounded-full ${role.class}">
                                ${role.text}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 text-xs rounded-full ${admin.status === 1 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}">
                                ${admin.status === 1 ? '正常' : '禁用'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-gray-600">${admin.loginCount || 0}</td>
                        <td class="px-6 py-4 text-gray-600">${admin.lastLoginAt ? new Date(admin.lastLoginAt).toLocaleString('zh-CN') : '-'}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                ${admin.role !== 'superadmin' ? `
                                    <button onclick="toggleAdminStatus(${admin.id}, ${admin.status})" 
                                            class="text-sm ${admin.status === 1 ? 'text-red-600 hover:text-red-800' : 'text-emerald-600 hover:text-emerald-800'}">
                                        ${admin.status === 1 ? '禁用' : '启用'}
                                    </button>
                                ` : '<span class="text-xs text-gray-400">-</span>'}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function showAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
        }

        function hideAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('addForm').reset();
        }

        document.getElementById('addForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                username: document.getElementById('newUsername').value,
                displayName: document.getElementById('newDisplayName').value,
                password: document.getElementById('newPassword').value,
                role: document.getElementById('newRole').value
            };

            try {
                const response = await fetch('/api/admin/admins', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.success) {
                    hideAddModal();
                    loadAdmins();
                } else {
                    alert('添加失败: ' + result.error);
                }
            } catch (error) {
                console.error('添加失败:', error);
                alert('添加失败');
            }
        });

        async function toggleAdminStatus(adminId, currentStatus) {
            const newStatus = currentStatus === 1 ? 0 : 1;
            const action = newStatus === 1 ? '启用' : '禁用';
            
            if (!confirm(`确定要${action}该管理员吗？`)) return;

            try {
                const response = await fetch(`/api/admin/admins/${adminId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                const result = await response.json();
                if (result.success) {
                    loadAdmins();
                } else {
                    alert('操作失败: ' + result.message);
                }
            } catch (error) {
                console.error('操作失败:', error);
                alert('操作失败');
            }
        }

        // 初始化
        loadAdmins();
    </script>
</body>
</html>
