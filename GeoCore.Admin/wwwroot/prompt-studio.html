<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt 模板管理 - GCore Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background: #f3f4f6; }
        .sidebar-link.active { background: #eef2ff; color: #6366f1; border-right: 3px solid #6366f1; }
        .tab-btn.active { background: #6366f1; color: white; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Admin 侧边栏 -->
    <aside class="fixed left-0 top-0 h-full w-60 bg-white border-r border-gray-200 z-50">
        <div class="p-6 border-b border-gray-100">
            <a href="dashboard.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-orange-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-cog text-white"></i>
                </div>
                <div>
                    <h1 class="font-bold text-gray-900">GCore Admin</h1>
                    <p class="text-xs text-gray-500">后台管理系统</p>
                </div>
            </a>
        </div>
        <nav class="p-3 space-y-0.5 text-sm">
            <p class="text-xs text-gray-400 uppercase tracking-wider mt-4 mb-2 px-3">概览</p>
            <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600">
                <i class="fas fa-tachometer-alt w-5 text-center"></i><span>仪表盘</span>
            </a>
            <p class="text-xs text-gray-400 uppercase tracking-wider mt-4 mb-2 px-3">内容管理</p>
            <a href="prompt-config.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600">
                <i class="fas fa-terminal w-5 text-center"></i><span>Prompt 配置</span>
            </a>
            <a href="prompt-studio.html" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-lg">
                <i class="fas fa-magic w-5 text-center"></i><span>Prompt 模板</span>
            </a>
            <a href="distillation.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600">
                <i class="fas fa-filter w-5 text-center"></i><span>蒸馏配置</span>
            </a>
            <p class="text-xs text-gray-400 uppercase tracking-wider mt-4 mb-2 px-3">系统配置</p>
            <a href="model-config.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600">
                <i class="fas fa-robot w-5 text-center"></i><span>大模型配置</span>
            </a>
            <a href="system-config.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600">
                <i class="fas fa-sliders-h w-5 text-center"></i><span>系统参数</span>
            </a>
            <p class="text-xs text-gray-400 uppercase tracking-wider mt-4 mb-2 px-3">用户管理</p>
            <a href="users.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600">
                <i class="fas fa-users w-5 text-center"></i><span>用户管理</span>
            </a>
            <a href="admins.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600">
                <i class="fas fa-user-shield w-5 text-center"></i><span>管理员</span>
            </a>
        </nav>
    </aside>

    <main class="ml-60">
        <header class="sticky top-0 bg-white border-b border-gray-200 px-8 py-4 z-40">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">Prompt 模板管理</h2>
                    <p class="text-sm text-gray-500">管理平台的 Prompt 模板库 | 版本控制 | 变量定义</p>
                </div>
                <button onclick="showCreateModal()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                    <i class="fas fa-plus mr-2"></i>新建模板
                </button>
            </div>
        </header>

        <div class="p-8">
            <!-- 功能标签页 -->
            <div class="flex gap-2 mb-6">
                <button class="tab-btn active px-4 py-2 rounded-lg font-medium" onclick="switchTab('list')">模板列表</button>
                <button class="tab-btn px-4 py-2 rounded-lg font-medium bg-gray-100 text-gray-600" onclick="switchTab('categories')">分类管理</button>
                <button class="tab-btn px-4 py-2 rounded-lg font-medium bg-gray-100 text-gray-600" onclick="switchTab('versions')">版本历史</button>
            </div>

            <!-- 筛选栏 -->
            <div class="bg-white rounded-xl p-4 shadow-sm mb-6">
                <div class="flex items-center gap-4">
                    <div class="flex-1">
                        <input type="text" id="searchInput" placeholder="搜索模板名称..." 
                               class="w-full px-4 py-2 border border-gray-200 rounded-lg"
                               oninput="filterTemplates()">
                    </div>
                    <select id="categoryFilter" class="px-4 py-2 border border-gray-200 rounded-lg" onchange="filterTemplates()">
                        <option value="">全部分类</option>
                    </select>
                    <select id="statusFilter" class="px-4 py-2 border border-gray-200 rounded-lg" onchange="filterTemplates()">
                        <option value="">全部状态</option>
                        <option value="enabled">已启用</option>
                        <option value="disabled">已禁用</option>
                    </select>
                    <button onclick="loadTemplates()" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <!-- 模板列表 -->
            <div id="templateList" class="space-y-4">
                <div class="text-center py-12 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 创建/编辑模态框 -->
    <div id="templateModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
        <div class="bg-white rounded-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto m-4">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center justify-between">
                    <h3 id="modalTitle" class="text-lg font-bold text-gray-900">新建模板</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>
            <form id="templateForm" class="p-6 space-y-4">
                <input type="hidden" id="templateId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">模板名称 *</label>
                        <input type="text" id="templateName" required
                               class="w-full px-4 py-2 border border-gray-200 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">分类</label>
                        <input type="text" id="templateCategory" placeholder="如: question_generation"
                               class="w-full px-4 py-2 border border-gray-200 rounded-lg">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
                    <input type="text" id="templateDescription"
                           class="w-full px-4 py-2 border border-gray-200 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">模板内容 *</label>
                    <textarea id="templateContent" rows="12" required
                              class="w-full px-4 py-2 border border-gray-200 rounded-lg font-mono text-sm"
                              placeholder="使用 {{变量名}} 定义变量"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">变量定义 (JSON)</label>
                    <textarea id="templateVariables" rows="4"
                              class="w-full px-4 py-2 border border-gray-200 rounded-lg font-mono text-sm"
                              placeholder='[{"name": "brand", "type": "string", "required": true, "description": "品牌名称"}]'></textarea>
                </div>
                <div class="flex items-center gap-4">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" id="templateIsDefault" class="rounded">
                        <span class="text-sm text-gray-700">设为默认模板</span>
                    </label>
                </div>
                <div id="changeNoteSection" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-2">变更说明</label>
                    <input type="text" id="changeNote" placeholder="描述本次修改..."
                           class="w-full px-4 py-2 border border-gray-200 rounded-lg">
                </div>
            </form>
            <div class="p-6 border-t border-gray-200 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">
                    取消
                </button>
                <button onclick="saveTemplate()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                    <i class="fas fa-save mr-2"></i>保存
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/PromptTemplateAdmin';
        let allTemplates = [];

        // 加载模板列表
        async function loadTemplates() {
            try {
                const res = await fetch(`${API_BASE}`);
                const data = await res.json();
                if (data.success) {
                    allTemplates = data.data;
                    renderTemplates(allTemplates);
                    loadCategories();
                }
            } catch (err) {
                console.error('加载模板失败:', err);
                document.getElementById('templateList').innerHTML = `
                    <div class="text-center py-12 text-red-500">
                        <i class="fas fa-exclamation-circle text-2xl mb-2"></i>
                        <p>加载失败，请检查后台服务</p>
                    </div>
                `;
            }
        }

        // 加载分类
        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE}/categories`);
                const data = await res.json();
                if (data.success) {
                    const select = document.getElementById('categoryFilter');
                    select.innerHTML = '<option value="">全部分类</option>';
                    data.data.forEach(cat => {
                        select.innerHTML += `<option value="${cat}">${cat}</option>`;
                    });
                }
            } catch (err) {
                console.error('加载分类失败:', err);
            }
        }

        // 渲染模板列表
        function renderTemplates(templates) {
            const container = document.getElementById('templateList');
            if (templates.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i class="fas fa-inbox text-4xl mb-2"></i>
                        <p>暂无模板</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = templates.map(t => `
                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <h4 class="font-semibold text-gray-900">${t.name}</h4>
                                <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded">${t.category}</span>
                                <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">v${t.version}</span>
                                ${t.isDefault ? '<span class="text-xs bg-amber-100 text-amber-600 px-2 py-0.5 rounded">默认</span>' : ''}
                                ${t.isEnabled ? 
                                    '<span class="text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded">已启用</span>' : 
                                    '<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded">已禁用</span>'}
                            </div>
                            <p class="text-sm text-gray-500">${t.description || '无描述'}</p>
                            <p class="text-xs text-gray-400 mt-2">
                                更新于 ${new Date(t.updatedAt).toLocaleString()}
                            </p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="editTemplate(${t.id})" class="p-2 text-gray-400 hover:text-indigo-600" title="编辑">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="viewVersions(${t.id})" class="p-2 text-gray-400 hover:text-blue-600" title="版本历史">
                                <i class="fas fa-history"></i>
                            </button>
                            <button onclick="toggleTemplate(${t.id}, ${!t.isEnabled})" 
                                    class="p-2 text-gray-400 hover:text-amber-600" 
                                    title="${t.isEnabled ? '禁用' : '启用'}">
                                <i class="fas fa-${t.isEnabled ? 'ban' : 'check'}"></i>
                            </button>
                            <button onclick="deleteTemplate(${t.id})" class="p-2 text-gray-400 hover:text-red-600" title="删除">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 筛选模板
        function filterTemplates() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;

            let filtered = allTemplates;
            if (search) {
                filtered = filtered.filter(t => t.name.toLowerCase().includes(search));
            }
            if (category) {
                filtered = filtered.filter(t => t.category === category);
            }
            if (status === 'enabled') {
                filtered = filtered.filter(t => t.isEnabled);
            } else if (status === 'disabled') {
                filtered = filtered.filter(t => !t.isEnabled);
            }

            renderTemplates(filtered);
        }

        // 显示创建模态框
        function showCreateModal() {
            document.getElementById('modalTitle').textContent = '新建模板';
            document.getElementById('templateId').value = '';
            document.getElementById('templateForm').reset();
            document.getElementById('changeNoteSection').classList.add('hidden');
            document.getElementById('templateModal').classList.remove('hidden');
            document.getElementById('templateModal').classList.add('flex');
        }

        // 编辑模板
        async function editTemplate(id) {
            try {
                const res = await fetch(`${API_BASE}/${id}`);
                const data = await res.json();
                if (data.success) {
                    const t = data.data;
                    document.getElementById('modalTitle').textContent = '编辑模板';
                    document.getElementById('templateId').value = t.id;
                    document.getElementById('templateName').value = t.name;
                    document.getElementById('templateCategory').value = t.category;
                    document.getElementById('templateDescription').value = t.description || '';
                    document.getElementById('templateContent').value = t.template;
                    document.getElementById('templateVariables').value = t.variables || '[]';
                    document.getElementById('templateIsDefault').checked = t.isDefault;
                    document.getElementById('changeNoteSection').classList.remove('hidden');
                    document.getElementById('templateModal').classList.remove('hidden');
                    document.getElementById('templateModal').classList.add('flex');
                }
            } catch (err) {
                alert('加载模板失败');
            }
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('templateModal').classList.add('hidden');
            document.getElementById('templateModal').classList.remove('flex');
        }

        // 保存模板
        async function saveTemplate() {
            const id = document.getElementById('templateId').value;
            const payload = {
                name: document.getElementById('templateName').value,
                category: document.getElementById('templateCategory').value || 'general',
                description: document.getElementById('templateDescription').value,
                template: document.getElementById('templateContent').value,
                variables: document.getElementById('templateVariables').value || '[]',
                isDefault: document.getElementById('templateIsDefault').checked,
                changeNote: document.getElementById('changeNote').value
            };

            try {
                const url = id ? `${API_BASE}/${id}` : API_BASE;
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    closeModal();
                    loadTemplates();
                    alert(id ? '更新成功' : '创建成功');
                } else {
                    alert(data.error || '操作失败');
                }
            } catch (err) {
                alert('保存失败');
            }
        }

        // 切换启用状态
        async function toggleTemplate(id, enable) {
            try {
                const res = await fetch(`${API_BASE}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isEnabled: enable })
                });
                const data = await res.json();
                if (data.success) {
                    loadTemplates();
                }
            } catch (err) {
                alert('操作失败');
            }
        }

        // 删除模板
        async function deleteTemplate(id) {
            if (!confirm('确定要删除此模板吗？')) return;
            try {
                const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    loadTemplates();
                }
            } catch (err) {
                alert('删除失败');
            }
        }

        // 查看版本历史
        async function viewVersions(id) {
            try {
                const res = await fetch(`${API_BASE}/${id}/versions`);
                const data = await res.json();
                if (data.success) {
                    const versions = data.data;
                    alert(`版本历史:\n${versions.map(v => `v${v.version}: ${v.changeNote} (${new Date(v.createdAt).toLocaleString()})`).join('\n')}`);
                }
            } catch (err) {
                alert('加载版本历史失败');
            }
        }

        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-indigo-600', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-600');
            });
            event.target.classList.add('active');
            event.target.classList.remove('bg-gray-100', 'text-gray-600');
        }

        // 初始化
        loadTemplates();
    </script>
</body>
</html>
