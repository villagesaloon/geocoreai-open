<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - GEOCore AI 运营后台</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-3 mb-4">
                <div class="w-12 h-12 gradient-bg rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-2xl">G</span>
                </div>
                <div class="text-left">
                    <div class="text-white font-bold text-xl">GEOCore AI</div>
                    <div class="text-gray-400 text-sm">运营管理后台</div>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-2xl p-8 border border-gray-700">
            <h2 class="text-2xl font-bold text-white mb-2">管理员登录</h2>
            <p class="text-gray-400 mb-6">请使用管理员账号登录</p>

            <!-- 错误提示 -->
            <div id="errorAlert" class="hidden bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl mb-4">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorMessage"></span>
            </div>

            <!-- 成功提示 -->
            <div id="successAlert" class="hidden bg-green-500/20 border border-green-500/50 text-green-400 px-4 py-3 rounded-xl mb-4">
                <i class="fas fa-check-circle mr-2"></i>
                <span id="successMessage"></span>
            </div>

            <form id="adminLoginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-2">用户名</label>
                    <input type="text" id="username" placeholder="admin" required
                           class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-2">密码</label>
                    <input type="password" id="password" placeholder="••••••••" required
                           class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <button type="submit" id="loginBtn" class="w-full gradient-bg text-white py-3 px-4 rounded-xl font-medium hover:opacity-90 transition mt-6 disabled:opacity-50">
                    <i class="fas fa-lock mr-2"></i><span id="loginBtnText">安全登录</span>
                </button>
            </form>

            <div class="mt-6 p-4 bg-gray-700/50 rounded-lg">
                <div class="flex items-center gap-2 text-amber-400 text-sm mb-2">
                    <i class="fas fa-shield-alt"></i>
                    <span class="font-medium">安全提示</span>
                </div>
                <p class="text-gray-400 text-xs">
                    此为内部管理系统，仅限授权人员访问。所有操作将被记录审计。
                </p>
            </div>
        </div>

        <p class="text-center text-gray-500 text-sm mt-6">
            © 2026 GEOCore AI. 内部系统
        </p>
    </div>

    <script>
        function showError(message) {
            const alert = document.getElementById('errorAlert');
            document.getElementById('errorMessage').textContent = message;
            alert.classList.remove('hidden');
            document.getElementById('successAlert').classList.add('hidden');
        }

        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            document.getElementById('successMessage').textContent = message;
            alert.classList.remove('hidden');
            document.getElementById('errorAlert').classList.add('hidden');
        }

        // 检查是否已登录
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btnText.textContent = '登录中...';

            try {
                const response = await fetch('/api/admin/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('adminLoggedIn', 'true');
                    localStorage.setItem('adminToken', result.token);
                    localStorage.setItem('adminUser', JSON.stringify(result.admin));
                    showSuccess('登录成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showError(result.error || '登录失败');
                    btn.disabled = false;
                    btnText.textContent = '安全登录';
                }
            } catch (error) {
                console.error('登录错误:', error);
                showError('网络错误，请重试');
                btn.disabled = false;
                btnText.textContent = '安全登录';
            }
        });
    </script>
</body>
</html>
