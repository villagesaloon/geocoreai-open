<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt 工作室 - GCore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background: #f3f4f6; }
        .sidebar-link.active { background: #eef2ff; color: #6366f1; border-right: 3px solid #6366f1; }
        .tab-btn.active { background: #6366f1; color: white; }
        .layer-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 侧边栏 - 使用统一导航组件 -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-60 bg-white border-r border-gray-200 z-50"></aside>
    <script src="js/navigation.js"></script>
    <main class="ml-60">
        <header class="sticky top-0 bg-white border-b border-gray-200 px-8 py-4 z-40">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">Prompt 工作室</h2>
                    <p class="text-sm text-gray-500">五层蒸馏 Prompt 生成 | 模板库 | 问题集管理</p>
                </div>
                <button class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                    <i class="fas fa-play mr-2"></i>批量生成
                </button>
            </div>
        </header>
        <div class="p-8">
            <!-- 功能标签页 -->
            <div class="flex gap-2 mb-6">
                <button class="tab-btn active px-4 py-2 rounded-lg font-medium">五层蒸馏生成器</button>
                <button class="tab-btn px-4 py-2 rounded-lg font-medium bg-gray-100 text-gray-600">Prompt 模板库</button>
                <button class="tab-btn px-4 py-2 rounded-lg font-medium bg-gray-100 text-gray-600">问题集管理</button>
                <button class="tab-btn px-4 py-2 rounded-lg font-medium bg-gray-100 text-gray-600">生成历史</button>
            </div>

            <!-- 五层蒸馏流程 -->
            <div class="bg-white rounded-xl p-6 shadow-sm mb-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">五层蒸馏流程</h3>
                <div class="grid grid-cols-5 gap-4">
                    <div class="layer-card bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-4 text-center transition-all cursor-pointer border-2 border-blue-200">
                        <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-user text-white text-xl"></i>
                        </div>
                        <p class="font-semibold text-blue-700">第1层</p>
                        <p class="text-sm text-blue-600">用户画像</p>
                        <p class="text-xs text-blue-500 mt-2">12 个画像</p>
                    </div>
                    <div class="layer-card bg-gradient-to-br from-purple-50 to-purple-100 rounded-xl p-4 text-center transition-all cursor-pointer border-2 border-purple-200">
                        <div class="w-12 h-12 bg-purple-500 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-search text-white text-xl"></i>
                        </div>
                        <p class="font-semibold text-purple-700">第2层</p>
                        <p class="text-sm text-purple-600">关键词扩展</p>
                        <p class="text-xs text-purple-500 mt-2">248 个词</p>
                    </div>
                    <div class="layer-card bg-gradient-to-br from-emerald-50 to-emerald-100 rounded-xl p-4 text-center transition-all cursor-pointer border-2 border-emerald-200">
                        <div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-route text-white text-xl"></i>
                        </div>
                        <p class="font-semibold text-emerald-700">第3层</p>
                        <p class="text-sm text-emerald-600">决策旅程</p>
                        <p class="text-xs text-emerald-500 mt-2">5 个阶段</p>
                    </div>
                    <div class="layer-card bg-gradient-to-br from-amber-50 to-amber-100 rounded-xl p-4 text-center transition-all cursor-pointer border-2 border-amber-200">
                        <div class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-theater-masks text-white text-xl"></i>
                        </div>
                        <p class="font-semibold text-amber-700">第4层</p>
                        <p class="text-sm text-amber-600">场景蒸馏</p>
                        <p class="text-xs text-amber-500 mt-2">36 个场景</p>
                    </div>
                    <div class="layer-card bg-gradient-to-br from-rose-50 to-rose-100 rounded-xl p-4 text-center transition-all cursor-pointer border-2 border-rose-200">
                        <div class="w-12 h-12 bg-rose-500 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-comments text-white text-xl"></i>
                        </div>
                        <p class="font-semibold text-rose-700">第5层</p>
                        <p class="text-sm text-rose-600">口语化蒸馏</p>
                        <p class="text-xs text-rose-500 mt-2">128 个问题</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <!-- 生成配置 -->
                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">生成配置</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">选择画像</label>
                            <select class="w-full px-4 py-2 border border-gray-200 rounded-lg">
                                <option>全部画像 (12个)</option>
                                <option>技术决策者</option>
                                <option>营销经理</option>
                                <option>小企业主</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">决策阶段</label>
                            <div class="flex flex-wrap gap-2">
                                <label class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg cursor-pointer">
                                    <input type="checkbox" checked class="rounded"> 认知
                                </label>
                                <label class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg cursor-pointer">
                                    <input type="checkbox" checked class="rounded"> 考虑
                                </label>
                                <label class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg cursor-pointer">
                                    <input type="checkbox" checked class="rounded"> 决策
                                </label>
                                <label class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg cursor-pointer">
                                    <input type="checkbox" class="rounded"> 购买
                                </label>
                                <label class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-lg cursor-pointer">
                                    <input type="checkbox" class="rounded"> 留存
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">生成数量</label>
                            <input type="number" value="50" class="w-full px-4 py-2 border border-gray-200 rounded-lg">
                        </div>
                        <button class="w-full py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">
                            <i class="fas fa-magic mr-2"></i>开始生成
                        </button>
                    </div>
                </div>

                <!-- 生成预览 -->
                <div class="bg-white rounded-xl p-6 shadow-sm">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">生成预览</h3>
                    <div class="space-y-3 max-h-80 overflow-y-auto">
                        <div class="p-3 bg-gray-50 rounded-lg">
                            <p class="text-sm text-gray-700">"作为一个正在寻找AI优化工具的营销经理，我应该如何评估不同方案？"</p>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded">营销经理</span>
                                <span class="text-xs bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded">考虑阶段</span>
                            </div>
                        </div>
                        <div class="p-3 bg-gray-50 rounded-lg">
                            <p class="text-sm text-gray-700">"有没有好用的品牌可见度分析工具推荐？最好能分析ChatGPT的数据"</p>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-xs bg-purple-100 text-purple-600 px-2 py-0.5 rounded">小企业主</span>
                                <span class="text-xs bg-amber-100 text-amber-600 px-2 py-0.5 rounded">认知阶段</span>
                            </div>
                        </div>
                        <div class="p-3 bg-gray-50 rounded-lg">
                            <p class="text-sm text-gray-700">"GEO和传统SEO有什么区别？哪个对AI搜索更有效？"</p>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-xs bg-rose-100 text-rose-600 px-2 py-0.5 rounded">技术人员</span>
                                <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded">认知阶段</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
