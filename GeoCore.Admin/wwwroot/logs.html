<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作日志 - GCore Admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background: #f3f4f6; }
        .sidebar-link.active { background: #eef2ff; color: #6366f1; border-right: 3px solid #6366f1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-60 bg-white border-r border-gray-200 z-50"></aside>
    <script src="js/navigation.js"></script>

    <main class="ml-60">
        <!-- 顶部导航 -->
        <header class="sticky top-0 bg-white border-b border-gray-200 px-8 py-4 z-40">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">操作日志</h2>
                    <p class="text-sm text-gray-500">系统操作审计记录</p>
                </div>
            </div>
        </header>

        <div class="p-8">
            <div class="bg-white rounded-xl shadow-sm">
                <div class="p-6 border-b border-gray-200">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-gray-900">日志列表</h3>
                        <div class="flex items-center gap-4">
                            <select class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500">
                                <option>全部类型</option>
                                <option>登录</option>
                                <option>用户管理</option>
                                <option>系统配置</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="p-8 text-center text-gray-400">
                    <i class="fas fa-file-alt text-5xl mb-4"></i>
                    <p class="text-lg">操作日志功能开发中</p>
                    <p class="text-sm mt-2">审计日志将记录所有管理操作</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
