<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - GCore Admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover { background: #f3f4f6; }
        .sidebar-link.active { background: #eef2ff; color: #6366f1; border-right: 3px solid #6366f1; }
        .metric-card { transition: all 0.2s; }
        .metric-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 侧边栏 -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-60 bg-white border-r border-gray-200 z-50"></aside>
    <script src="js/navigation.js"></script>

    <main class="ml-60">
        <!-- 顶部导航 -->
        <header class="sticky top-0 bg-white border-b border-gray-200 px-8 py-4 z-40">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">运营仪表盘</h2>
                    <p class="text-sm text-gray-500">GEOCore AI 平台运营概览</p>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500">最后更新: <span id="lastUpdate">刚刚</span></span>
                    <button onclick="loadStats()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                        <i class="fas fa-sync-alt mr-2"></i>刷新
                    </button>
                </div>
            </div>
        </header>

        <div class="p-8">
            <!-- 核心指标卡片 -->
            <div class="grid grid-cols-4 gap-6 mb-8">
                <div class="metric-card bg-white rounded-xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm font-medium text-gray-500">总用户数</span>
                        <span class="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-users text-indigo-600"></i>
                        </span>
                    </div>
                    <p id="statTotal" class="text-3xl font-bold text-gray-900">-</p>
                    <p class="text-xs text-gray-400 mt-2">平台注册用户</p>
                </div>

                <div class="metric-card bg-white rounded-xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm font-medium text-gray-500">活跃用户</span>
                        <span class="w-10 h-10 bg-emerald-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-user-check text-emerald-600"></i>
                        </span>
                    </div>
                    <p id="statActive" class="text-3xl font-bold text-gray-900">-</p>
                    <p class="text-xs text-gray-400 mt-2">状态正常用户</p>
                </div>

                <div class="metric-card bg-white rounded-xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm font-medium text-gray-500">今日新增</span>
                        <span class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-user-plus text-amber-600"></i>
                        </span>
                    </div>
                    <p id="statToday" class="text-3xl font-bold text-gray-900">-</p>
                    <p class="text-xs text-gray-400 mt-2">今日注册</p>
                </div>

                <div class="metric-card bg-white rounded-xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm font-medium text-gray-500">今日活跃</span>
                        <span class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                            <i class="fas fa-chart-line text-purple-600"></i>
                        </span>
                    </div>
                    <p id="statTodayActive" class="text-3xl font-bold text-gray-900">-</p>
                    <p class="text-xs text-gray-400 mt-2">今日登录</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-6 mb-8">
                <!-- 快捷入口 -->
                <div class="col-span-2 bg-white rounded-xl shadow-sm">
                    <div class="p-6 border-b border-gray-100">
                        <h3 class="text-lg font-semibold text-gray-900"><i class="fas fa-th-large text-indigo-500 mr-2"></i>快捷入口</h3>
                    </div>
                    <div class="p-6 grid grid-cols-3 gap-4">
                        <a href="users.html" class="p-4 border border-gray-200 rounded-xl hover:border-indigo-300 hover:bg-indigo-50 transition text-center">
                            <i class="fas fa-users text-indigo-600 text-2xl mb-2"></i>
                            <p class="text-sm font-medium text-gray-900">SaaS 用户</p>
                        </a>
                        <a href="admins.html" class="p-4 border border-gray-200 rounded-xl hover:border-purple-300 hover:bg-purple-50 transition text-center">
                            <i class="fas fa-user-shield text-purple-600 text-2xl mb-2"></i>
                            <p class="text-sm font-medium text-gray-900">管理员</p>
                        </a>
                        <a href="analytics.html" class="p-4 border border-gray-200 rounded-xl hover:border-emerald-300 hover:bg-emerald-50 transition text-center">
                            <i class="fas fa-chart-bar text-emerald-600 text-2xl mb-2"></i>
                            <p class="text-sm font-medium text-gray-900">数据统计</p>
                        </a>
                        <a href="settings.html" class="p-4 border border-gray-200 rounded-xl hover:border-amber-300 hover:bg-amber-50 transition text-center">
                            <i class="fas fa-cog text-amber-600 text-2xl mb-2"></i>
                            <p class="text-sm font-medium text-gray-900">系统设置</p>
                        </a>
                        <a href="prompt-config.html" class="p-4 border border-gray-200 rounded-xl hover:border-pink-300 hover:bg-pink-50 transition text-center">
                            <i class="fas fa-file-code text-pink-600 text-2xl mb-2"></i>
                            <p class="text-sm font-medium text-gray-900">Prompt 配置</p>
                        </a>
                        <a href="system-config.html" class="p-4 border border-gray-200 rounded-xl hover:border-cyan-300 hover:bg-cyan-50 transition text-center">
                            <i class="fas fa-sliders-h text-cyan-600 text-2xl mb-2"></i>
                            <p class="text-sm font-medium text-gray-900">系统参数</p>
                        </a>
                    </div>
                </div>

                <!-- 系统状态 -->
                <div class="bg-white rounded-xl shadow-sm">
                    <div class="p-6 border-b border-gray-100">
                        <h3 class="text-lg font-semibold text-gray-900"><i class="fas fa-server text-emerald-500 mr-2"></i>系统状态</h3>
                    </div>
                    <div class="p-6 space-y-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                                <span class="text-sm text-gray-600">SaaS 前台</span>
                            </div>
                            <span class="text-xs text-emerald-600">运行中</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                                <span class="text-sm text-gray-600">Admin 后台</span>
                            </div>
                            <span class="text-xs text-emerald-600">运行中</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span id="dbDot" class="w-2 h-2 bg-gray-300 rounded-full"></span>
                                <span class="text-sm text-gray-600">MySQL 数据库</span>
                            </div>
                            <span id="dbText" class="text-xs text-gray-400">检测中...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 最近用户 -->
            <div class="bg-white rounded-xl shadow-sm">
                <div class="p-6 border-b border-gray-100">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold text-gray-900"><i class="fas fa-clock text-blue-500 mr-2"></i>最近注册用户</h3>
                        <a href="users.html" class="text-sm text-indigo-600 hover:underline">查看全部</a>
                    </div>
                </div>
                <div id="recentUsers" class="p-6">
                    <p class="text-center text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>加载中...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/users/stats');
                const result = await response.json();
                if (result.success) {
                    document.getElementById('statTotal').textContent = result.data.totalUsers;
                    document.getElementById('statActive').textContent = result.data.activeUsers;
                    document.getElementById('statToday').textContent = result.data.todayNewUsers;
                    document.getElementById('statTodayActive').textContent = result.data.todayActiveUsers;
                }
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        async function loadRecentUsers() {
            try {
                const response = await fetch('/api/admin/users?page=1&pageSize=5');
                const result = await response.json();
                const container = document.getElementById('recentUsers');
                
                if (result.success && result.data && result.data.length > 0) {
                    container.innerHTML = `
                        <div class="space-y-3">
                            ${result.data.map(user => `
                                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                    <div class="flex items-center gap-3">
                                        <img src="${user.photoUrl || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || user.email)}" 
                                             alt="" class="w-10 h-10 rounded-full">
                                        <div>
                                            <p class="font-medium text-gray-900">${user.displayName || '-'}</p>
                                            <p class="text-xs text-gray-500">${user.email}</p>
                                        </div>
                                    </div>
                                    <span class="text-xs text-gray-400">${user.createdAt ? new Date(user.createdAt).toLocaleDateString('zh-CN') : '-'}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    container.innerHTML = '<p class="text-center text-gray-400">暂无用户</p>';
                }
            } catch (error) {
                console.error('加载用户失败:', error);
                document.getElementById('recentUsers').innerHTML = '<p class="text-center text-red-400">加载失败</p>';
            }
        }

        async function checkHealth() {
            try {
                const response = await fetch('/api/health');
                const result = await response.json();
                if (result.Status === 'OK') {
                    document.getElementById('dbDot').className = 'w-2 h-2 bg-emerald-500 rounded-full';
                    document.getElementById('dbText').textContent = '连接正常';
                    document.getElementById('dbText').className = 'text-xs text-emerald-600';
                }
            } catch (error) {
                document.getElementById('dbDot').className = 'w-2 h-2 bg-red-500 rounded-full';
                document.getElementById('dbText').textContent = '连接失败';
                document.getElementById('dbText').className = 'text-xs text-red-600';
            }
        }

        // 初始化
        loadStats();
        loadRecentUsers();
        checkHealth();
    </script>
</body>
</html>
